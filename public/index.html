<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Policy Integrity Management Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useMemo, useRef } = React;

      const modules = [
        { key: "dashboard", label: "Dashboard" },
        { key: "workbench", label: "Policy Workbench" },
        { key: "validation", label: "Validation Center" },
        { key: "corrections", label: "Correction Center" },
        { key: "audit", label: "Audit Logs" },
        { key: "rules", label: "Rule Configuration" }
      ];

      const suiteMenus = ["Desktop", "Account", "Policy", "Contact", "Reinsurance", "Search", "Team"];

      const moduleDescriptions = {
        dashboard: "Monitor policy quality, correction outcomes, and enterprise risk posture.",
        workbench: "Create and manage policy records before validation and governance execution.",
        validation: "Review detected issues across all validation layers and policy records.",
        corrections: "Track applied corrections and clear suggestion queues with controlled actions.",
        audit: "Inspect the timeline of system decisions, rule triggers, and correction events.",
        rules: "Configure validation rules, severity weightings, and execution governance settings."
      };

      const defaultForm = {
        premium: -500,
        coverage: 200000,
        status: "Active",
        hasCustomer: true,
        customerName: "Aarav Sharma",
        customerAddress: "12 Green Street",
        policyAddress: "",
        duplicateCustomerCandidate: true,
        billingActive: false,
        configValid: true,
        actor: "ui.user"
      };

      function wait(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function SeverityBadge({ value }) {
        return <span className={`badge sev-${String(value || "").toLowerCase()}`}>{value}</span>;
      }

      function StatusBadge({ value }) {
        return <span className={`badge st-${String(value || "").toLowerCase()}`}>{value}</span>;
      }

      function moduleIcon(moduleName = "") {
        const module = moduleName.toLowerCase();
        if (module.includes("detect") || module.includes("validation")) {
          return "VAL";
        }
        if (module.includes("correct")) {
          return "FIX";
        }
        if (module.includes("score")) {
          return "SCR";
        }
        if (module.includes("audit")) {
          return "AUD";
        }
        if (module.includes("rules")) {
          return "CFG";
        }
        return "SYS";
      }

      function formatRelativeTime(timestamp) {
        if (!timestamp) {
          return "never";
        }
        const diffSec = Math.max(0, Math.floor((Date.now() - new Date(timestamp).getTime()) / 1000));
        if (diffSec < 60) {
          return `${diffSec}s ago`;
        }
        const diffMin = Math.floor(diffSec / 60);
        if (diffMin < 60) {
          return `${diffMin}m ago`;
        }
        const diffHr = Math.floor(diffMin / 60);
        return `${diffHr}h ago`;
      }

      function ChartPanel({ chartId, type, labels, values, title }) {
        const canvasRef = useRef(null);

        useEffect(() => {
          if (!canvasRef.current || !window.Chart) {
            return undefined;
          }

          const chart = new window.Chart(canvasRef.current, {
            type,
            data: {
              labels,
              datasets: [
                {
                  label: title,
                  data: values,
                  backgroundColor: [
                    "#0f766e",
                    "#0369a1",
                    "#65a30d",
                    "#b45309",
                    "#b91c1c"
                  ],
                  borderColor: "#ffffff",
                  borderWidth: 1
                }
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: type === "pie" || type === "doughnut" }
              }
            }
          });

          return () => chart.destroy();
        }, [type, labels.join("|"), values.join("|")]);

        return (
          <div className="chart-card">
            <div className="chart-title">{title}</div>
            <div className="chart-body"><canvas id={chartId} ref={canvasRef}></canvas></div>
          </div>
        );
      }

      function App() {
        const [activeModule, setActiveModule] = useState("dashboard");
        const [form, setForm] = useState(defaultForm);
        const [policies, setPolicies] = useState([]);
        const [rules, setRules] = useState([]);
        const [auditEvents, setAuditEvents] = useState([]);
        const [issues, setIssues] = useState([]);
        const [corrections, setCorrections] = useState([]);
        const [selectedPolicyId, setSelectedPolicyId] = useState("");
        const [runResult, setRunResult] = useState(null);
        const [statusText, setStatusText] = useState("Ready");
        const [running, setRunning] = useState(false);
        const [workflowStep, setWorkflowStep] = useState(-1);
        const [workflowLogs, setWorkflowLogs] = useState([]);
        const [autoRerunRules, setAutoRerunRules] = useState(true);
        const [lastRunAt, setLastRunAt] = useState(null);
        const [demoModeRunning, setDemoModeRunning] = useState(false);
        const [ruleImpactMessage, setRuleImpactMessage] = useState("");
        const [demoCases, setDemoCases] = useState([]);
        const [selectedDemoCase, setSelectedDemoCase] = useState("");
        const [batchRunSummary, setBatchRunSummary] = useState(null);
        const [policySearch, setPolicySearch] = useState("");
        const [policySort, setPolicySort] = useState("updated_desc");
        const [validationFilters, setValidationFilters] = useState({
          severity: "",
          status: "",
          ruleId: "",
          policyId: "",
          search: ""
        });

        useEffect(() => {
          bootstrap();
          fetchIssues();
          fetchCorrections();
          fetchAudits();
          fetchDemoCases();
        }, []);

        async function bootstrap() {
          const res = await fetch("/api/platform/bootstrap");
          const data = await res.json();
          setPolicies(data.policies || []);
          setRules(data.rules || []);
          setAuditEvents(data.auditEvents || []);
          if (!selectedPolicyId && data.policies && data.policies.length > 0) {
            setSelectedPolicyId(data.policies[0].policyId);
            setForm(data.policies[0].input);
          }
        }

        async function fetchIssues(filters = validationFilters) {
          const params = new URLSearchParams();
          Object.entries(filters).forEach(([k, v]) => {
            if (v) {
              params.append(k, v);
            }
          });
          const res = await fetch(`/api/platform/issues?${params.toString()}`);
          const data = await res.json();
          setIssues(data.issues || []);
        }

        async function fetchCorrections() {
          const res = await fetch("/api/platform/corrections");
          const data = await res.json();
          setCorrections(data.corrections || []);
        }

        async function fetchAudits(policyId = "") {
          const q = policyId ? `?policyId=${policyId}` : "";
          const res = await fetch(`/api/platform/audits${q}`);
          const data = await res.json();
          setAuditEvents(data.events || []);
        }

        async function fetchDemoCases() {
          try {
            const res = await fetch("/api/demo-cases");
            if (!res.ok) {
              throw new Error("Failed to load demo cases");
            }
            const data = await res.json();
            const cases = data.cases || [];
            setDemoCases(cases);
            if (!selectedDemoCase && cases.length > 0) {
              setSelectedDemoCase(cases[0].name);
            }
          } catch (error) {
            setStatusText("Unable to load demo cases");
          }
        }

        function setField(key, value) {
          setForm((prev) => ({ ...prev, [key]: value }));
        }

        async function createPolicyWithPayload(payload) {
          const response = await fetch("/api/platform/policies", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error("Create policy failed");
          }

          const created = await response.json();
          return created;
        }

        async function createPolicy() {
          const created = await createPolicyWithPayload(form);
          setSelectedPolicyId(created.policyId);
          setStatusText(`Policy created: ${created.policyId}`);
          await bootstrap();
          await fetchIssues();
          await fetchCorrections();
          await fetchAudits();
        }

        async function updatePolicy() {
          if (!selectedPolicyId) {
            setStatusText("Select a policy first");
            return;
          }
          await fetch(`/api/platform/policies/${selectedPolicyId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(form)
          });
          setStatusText(`Policy updated: ${selectedPolicyId}`);
          await bootstrap();
        }

        function loadDemoCase() {
          const match = demoCases.find((item) => item.name === selectedDemoCase);
          if (!match) {
            setStatusText("Choose a demo case first");
            return;
          }

          setForm({
            ...defaultForm,
            ...match.payload,
            policyAddress: match.payload.policyAddress || "",
            actor: "ui.user"
          });
          setStatusText(`Loaded: ${match.name}`);
        }

        async function seedDemoPack() {
          if (demoCases.length === 0) {
            setStatusText("No demo cases available to seed");
            return;
          }

          if (running || demoModeRunning) {
            return;
          }

          setRunning(true);
          setStatusText("Creating demo policy pack...");

          try {
            for (const demoCase of demoCases) {
              const payload = {
                ...defaultForm,
                ...demoCase.payload,
                policyAddress: demoCase.payload.policyAddress || "",
                actor: "demo.seed"
              };
              await createPolicyWithPayload(payload);
            }

            await bootstrap();
            await fetchIssues();
            await fetchCorrections();
            await fetchAudits();
            setStatusText(`Demo pack created: ${demoCases.length} policies`);
          } catch (error) {
            setStatusText("Demo pack creation failed");
          } finally {
            setRunning(false);
          }
        }

        async function runAllPolicies() {
          if (policies.length === 0) {
            setStatusText("Create at least one policy before running all");
            return;
          }

          setRunning(true);
          setStatusText("Running all policies...");

          try {
            const response = await fetch("/api/platform/run-all", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ actor: form.actor || "ui.user" })
            });

            if (!response.ok) {
              throw new Error("Batch run failed");
            }

            const data = await response.json();
            setBatchRunSummary(data.summary || null);
            setStatusText(`Batch run complete: ${data.count} policy(s)`);
            await bootstrap();
            await fetchIssues();
            await fetchCorrections();
            await fetchAudits();
            setActiveModule("dashboard");
          } catch (error) {
            setStatusText("Batch run failed");
          } finally {
            setRunning(false);
          }
        }

        async function deleteSelectedPolicy() {
          if (!selectedPolicyId) {
            setStatusText("Select a policy first");
            return;
          }

          const confirmed = window.confirm(`Delete ${selectedPolicyId}? This cannot be undone.`);
          if (!confirmed) {
            return;
          }

          const response = await fetch(`/api/platform/policies/${selectedPolicyId}`, {
            method: "DELETE"
          });

          if (!response.ok) {
            setStatusText("Delete failed");
            return;
          }

          setSelectedPolicyId("");
          setRunResult(null);
          setForm(defaultForm);
          setStatusText("Policy deleted");
          await bootstrap();
          await fetchIssues();
          await fetchCorrections();
          await fetchAudits();
        }

        async function resetPlatform() {
          const confirmed = window.confirm("Reset all policies, audits, and rule overrides?");
          if (!confirmed) {
            return;
          }

          const response = await fetch("/api/platform/reset", {
            method: "POST"
          });

          if (!response.ok) {
            setStatusText("Reset failed");
            return;
          }

          setSelectedPolicyId("");
          setRunResult(null);
          setBatchRunSummary(null);
          setForm(defaultForm);
          setValidationFilters({
            severity: "",
            status: "",
            ruleId: "",
            policyId: "",
            search: ""
          });

          await bootstrap();
          await fetchIssues({ severity: "", status: "", ruleId: "", policyId: "", search: "" });
          await fetchCorrections();
          await fetchAudits();
          setStatusText("Platform reset complete");
        }

        function exportSelectedSnapshot() {
          if (!selectedPolicyId) {
            setStatusText("Select a policy first");
            return;
          }

          const selectedPolicy = policies.find((p) => p.policyId === selectedPolicyId);
          const payload = {
            exportedAt: new Date().toISOString(),
            selectedPolicy,
            runResult,
            issues: issues.filter((item) => item.policyId === selectedPolicyId),
            corrections: corrections.filter((item) => item.policyId === selectedPolicyId),
            audits: auditEvents.filter((item) => item.policyId === selectedPolicyId)
          };

          const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const anchor = document.createElement("a");
          anchor.href = url;
          anchor.download = `${selectedPolicyId}-snapshot.json`;
          anchor.click();
          URL.revokeObjectURL(url);
          setStatusText(`Snapshot exported: ${selectedPolicyId}`);
        }

        function exportAuditLog() {
          const exportEvents = selectedPolicyId
            ? auditEvents.filter((event) => event.policyId === selectedPolicyId)
            : auditEvents;

          const payload = {
            exportedAt: new Date().toISOString(),
            selectedPolicyId,
            count: exportEvents.length,
            events: exportEvents
          };

          const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const anchor = document.createElement("a");
          anchor.href = url;
          anchor.download = selectedPolicyId ? `${selectedPolicyId}-audit.json` : "platform-audit.json";
          anchor.click();
          URL.revokeObjectURL(url);
          setStatusText("Audit timeline exported");
        }

        async function runPolicy(policyId = selectedPolicyId) {
          if (!policyId) {
            setStatusText("Create or select a policy first");
            return;
          }
          setRunning(true);
          setWorkflowLogs([]);
          setStatusText("Running platform workflow...");

          try {
            const steps = [
              "Running validation layer checks",
              "Applying correction governance",
              "Performing single re-validation",
              "Calculating weighted score",
              "Writing audit timeline"
            ];

            for (let i = 0; i < steps.length; i += 1) {
              setWorkflowStep(i);
              setWorkflowLogs((prev) => [...prev, steps[i]]);
              await wait(220);
            }

            const response = await fetch(`/api/platform/policies/${policyId}/run`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ actor: form.actor || "ui.user" })
            });

            if (!response.ok) {
              throw new Error("Run failed");
            }

            const data = await response.json();
            setRunResult(data);
            setLastRunAt(new Date().toISOString());
            setStatusText(`Run complete for ${policyId}`);
            setWorkflowLogs((prev) => [...prev, ...data.logs.map((l) => `${l.step}: ${l.message}`)]);
            await bootstrap();
            await fetchIssues();
            await fetchCorrections();
            await fetchAudits(policyId);
            return data;
          } catch (error) {
            setStatusText("Simulation failed");
            return null;
          } finally {
            setRunning(false);
            setWorkflowStep(-1);
          }
        }

        async function runDemoMode() {
          if (demoModeRunning || running) {
            return;
          }

          setDemoModeRunning(true);
          setStatusText("Demo mode running...");
          setRuleImpactMessage("");

          try {
            const selected = demoCases.find((item) => item.name === selectedDemoCase);
            const fallback = demoCases[0];
            const chosenCase = selected || fallback;
            const demoPayload = {
              ...defaultForm,
              ...(chosenCase ? chosenCase.payload : {}),
              policyAddress: chosenCase?.payload?.policyAddress || "",
              actor: "demo.mode"
            };

            setActiveModule("workbench");
            setForm(demoPayload);
            await wait(350);

            const created = await createPolicyWithPayload(demoPayload);
            setSelectedPolicyId(created.policyId);
            await bootstrap();
            await wait(350);

            await runPolicy(created.policyId);

            const tour = ["dashboard", "validation", "corrections", "audit", "rules"];
            for (const page of tour) {
              setActiveModule(page);
              await wait(850);
            }

            setStatusText("Demo mode complete");
          } catch (e) {
            setStatusText("Demo mode failed");
          } finally {
            setDemoModeRunning(false);
          }
        }

        async function updateRule(ruleId, patch) {
          const selectedPolicy = policies.find((p) => p.policyId === selectedPolicyId);
          const previousScore = selectedPolicy ? selectedPolicy.scoreAfter : null;

          await fetch(`/api/platform/rules/${ruleId}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(patch)
          });
          await bootstrap();
          await fetchAudits();
          setStatusText(`Rule updated: ${ruleId}`);
          if (autoRerunRules && selectedPolicyId) {
            const rerun = await runPolicy(selectedPolicyId);
            if (rerun && previousScore != null) {
              const delta = rerun.scoreAfter - previousScore;
              const sign = delta >= 0 ? "+" : "";
              setRuleImpactMessage(`Rule updated: score changed by ${sign}${delta}`);
            }
          }
        }

        async function resetRulesToDefault() {
          const confirmed = window.confirm("Reset all rule settings to catalog defaults?");
          if (!confirmed) {
            return;
          }

          const response = await fetch("/api/platform/rules/reset", {
            method: "POST"
          });

          if (!response.ok) {
            setStatusText("Failed to reset rules");
            return;
          }

          await bootstrap();
          await fetchAudits();
          setStatusText("Rule settings restored to default values");

          if (autoRerunRules && selectedPolicyId) {
            await runPolicy(selectedPolicyId);
          }
        }

        async function actOnSuggestion(policyId, issueKey, action) {
          await fetch(`/api/platform/policies/${policyId}/issues/${issueKey}/action`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action })
          });
          await fetchIssues();
          await bootstrap();
          await fetchAudits(policyId);
          setStatusText(`Suggestion ${action}d`);
        }

        function selectPolicy(policy) {
          setSelectedPolicyId(policy.policyId);
          setForm(policy.input);
          setStatusText(`Selected ${policy.policyId}`);
        }

        function clearValidationFilters() {
          const cleared = {
            severity: "",
            status: "",
            ruleId: "",
            policyId: "",
            search: ""
          };

          setValidationFilters(cleared);
          fetchIssues(cleared);
        }

        const dashboard = useMemo(() => {
          const total = policies.length;
          const avgScore = total ? Math.round(policies.reduce((sum, p) => sum + (p.scoreAfter || 0), 0) / total) : 0;
          const validated = policies.filter((p) => p.status === "VALIDATED").length;
          const corrected = policies.filter((p) => p.status === "CORRECTED").length;
          const blocked = policies.filter((p) => p.status === "BLOCKED").length;
          const criticalIssues = issues.filter((i) => i.severity === "Critical").length;
          const autoFixableCount = issues.filter((i) => i.autoFixable).length;
          const autoFixedCount = issues.filter((i) => i.autoFixable && i.status === "Resolved").length;
          const autoFixRate = autoFixableCount > 0 ? Math.round((autoFixedCount / autoFixableCount) * 100) : 0;
          const issueFreq = {};
          const severityBuckets = { Critical: 0, High: 0, Medium: 0, Low: 0 };
          issues.forEach((i) => {
            if (severityBuckets[i.severity] != null) {
              severityBuckets[i.severity] += 1;
            }
            issueFreq[i.ruleId] = (issueFreq[i.ruleId] || 0) + 1;
          });

          const topIssue = Object.keys(issueFreq).length
            ? Object.entries(issueFreq).sort((a, b) => b[1] - a[1])[0][0]
            : "No issues yet";

          const currentCritical = issues.filter((i) => i.severity === "Critical" && i.status !== "Resolved").length;
          const criticalReduction = criticalIssues > 0
            ? Math.max(0, Math.round(((criticalIssues - currentCritical) / criticalIssues) * 100))
            : 0;

          return {
            total,
            avgScore,
            criticalIssues,
            autoFixRate,
            validated,
            corrected,
            blocked,
            severityBuckets,
            topIssue,
            criticalReduction
          };
        }, [policies, issues]);

        const activeModuleDef = useMemo(
          () => modules.find((item) => item.key === activeModule) || modules[0],
          [activeModule]
        );

        const selectedPolicy = useMemo(
          () => policies.find((policy) => policy.policyId === selectedPolicyId) || null,
          [policies, selectedPolicyId]
        );

        const selectedPolicyIssueCount = useMemo(
          () => issues.filter((issue) => issue.policyId === selectedPolicyId).length,
          [issues, selectedPolicyId]
        );

        const selectedPolicySuggestionCount = useMemo(
          () => issues.filter((issue) => issue.policyId === selectedPolicyId && issue.status === "Suggested").length,
          [issues, selectedPolicyId]
        );

        const visiblePolicies = useMemo(() => {
          const query = policySearch.trim().toLowerCase();
          let items = [...policies];

          if (query) {
            items = items.filter((policy) => {
              const customerName = String(policy.input?.customerName || "").toLowerCase();
              return (
                String(policy.policyId || "").toLowerCase().includes(query) ||
                String(policy.status || "").toLowerCase().includes(query) ||
                customerName.includes(query)
              );
            });
          }

          const byDate = (left, right, field) => {
            const leftValue = left[field] ? new Date(left[field]).getTime() : 0;
            const rightValue = right[field] ? new Date(right[field]).getTime() : 0;
            return rightValue - leftValue;
          };

          switch (policySort) {
            case "score_desc":
              items.sort((a, b) => (b.scoreAfter || 0) - (a.scoreAfter || 0));
              break;
            case "score_asc":
              items.sort((a, b) => (a.scoreAfter || 0) - (b.scoreAfter || 0));
              break;
            case "status":
              items.sort((a, b) => String(a.status || "").localeCompare(String(b.status || "")));
              break;
            case "created_desc":
              items.sort((a, b) => byDate(a, b, "createdAt"));
              break;
            case "updated_desc":
            default:
              items.sort((a, b) => byDate(a, b, "updatedAt"));
              break;
          }

          return items;
        }, [policies, policySearch, policySort]);

        const workflowNames = ["Detect", "Classify", "Correct", "Re-validate", "Score", "Audit"];

        const renderDashboard = () => (
          <div className="module-grid">
            <div className="kpi-row">
              <div className="kpi"><span>Total Policies</span><strong>{dashboard.total}</strong></div>
              <div className="kpi"><span>Avg Integrity Score</span><strong>{dashboard.avgScore}</strong></div>
              <div className="kpi"><span>Critical Issues</span><strong>{dashboard.criticalIssues}</strong></div>
              <div className="kpi"><span>Auto Fix Rate</span><strong>{dashboard.autoFixRate}%</strong></div>
            </div>
            <section className="panel insights-panel">
              <h3>Insights</h3>
              <ul>
                <li>Most frequent issue: {dashboard.topIssue}</li>
                <li>Auto-fix success rate: {dashboard.autoFixRate}%</li>
                <li>Critical issues reduced by: {dashboard.criticalReduction}%</li>
              </ul>
            </section>
            {batchRunSummary && (
              <section className="panel batch-summary">
                <h3>Latest Batch Run</h3>
                <div className="kpi-row compact">
                  <div className="kpi"><span>Validated</span><strong>{batchRunSummary.validated}</strong></div>
                  <div className="kpi"><span>Corrected</span><strong>{batchRunSummary.corrected}</strong></div>
                  <div className="kpi"><span>Blocked</span><strong>{batchRunSummary.blocked}</strong></div>
                </div>
              </section>
            )}
            <div className="before-after-panel">
              <div className="panel stat-panel">
                <h3>Before vs After (Latest Run)</h3>
                {runResult ? (
                  <>
                    <div className="score-compare">
                      <div>
                        <div className="small-note">Before</div>
                        <div className="score-big">{runResult.scoreBefore}</div>
                      </div>
                      <div className="arrow">→</div>
                      <div>
                        <div className="small-note">After</div>
                        <div className="score-big">{runResult.scoreAfter}</div>
                      </div>
                      <div>
                        <div className="small-note">Delta</div>
                        <div className="score-delta">{runResult.scoreAfter - runResult.scoreBefore >= 0 ? `+${runResult.scoreAfter - runResult.scoreBefore}` : runResult.scoreAfter - runResult.scoreBefore}</div>
                      </div>
                    </div>
                    <div className="small-note">Policy: {runResult.policy?.policyId || selectedPolicyId || "-"}</div>
                  </>
                ) : (
                  <div className="small-note">Run a policy from Workbench to show before/after proof.</div>
                )}
              </div>
            </div>
            <div className="chart-grid">
              <ChartPanel chartId="severityPie" type="pie" title="Severity Distribution" labels={["Critical", "High", "Medium", "Low"]} values={[
                dashboard.severityBuckets.Critical,
                dashboard.severityBuckets.High,
                dashboard.severityBuckets.Medium,
                dashboard.severityBuckets.Low
              ]} />
              <ChartPanel chartId="statusBars" type="bar" title="Policy Status" labels={["VALIDATED", "CORRECTED", "BLOCKED"]} values={[
                dashboard.validated,
                dashboard.corrected,
                dashboard.blocked
              ]} />
              <ChartPanel chartId="scoreTrend" type="line" title="Score Trend" labels={policies.slice(0, 8).map((p) => p.policyId)} values={policies.slice(0, 8).map((p) => p.scoreAfter || 0)} />
              <ChartPanel chartId="issuesTrend" type="line" title="Issues Trend" labels={policies.slice(0, 8).map((p) => p.policyId)} values={policies.slice(0, 8).map((p) => p.issueCount || 0)} />
            </div>
          </div>
        );

        const renderWorkbench = () => (
          <div className="module-grid two-col">
            <section className="panel">
              <h2>Policy Form</h2>
              <div className="scenario-strip">
                <select value={selectedDemoCase} onChange={(e) => setSelectedDemoCase(e.target.value)}>
                  {demoCases.length === 0 && <option value="">No demo cases loaded</option>}
                  {demoCases.map((demoCase) => (
                    <option key={demoCase.name} value={demoCase.name}>{demoCase.name}</option>
                  ))}
                </select>
                <button className="btn-secondary" onClick={loadDemoCase}>Load Demo Case</button>
                <button className="btn-secondary" onClick={seedDemoPack} disabled={running || demoModeRunning || demoCases.length === 0}>Seed Demo Pack</button>
                <button className="btn-ghost" onClick={runDemoMode} disabled={demoModeRunning || running}>
                  {demoModeRunning ? "Demo Running..." : "Guided Demo"}
                </button>
              </div>
              <div className="form-grid">
                <div className="field"><label>Premium</label><input type="number" value={form.premium} onChange={(e) => setField("premium", Number(e.target.value))} /></div>
                <div className="field"><label>Coverage</label><input type="number" value={form.coverage} onChange={(e) => setField("coverage", Number(e.target.value))} /></div>
                <div className="field"><label>Status</label><select value={form.status} onChange={(e) => setField("status", e.target.value)}><option>Active</option><option>Cancelled</option></select></div>
                <div className="field"><label>Actor</label><input value={form.actor} onChange={(e) => setField("actor", e.target.value)} /></div>
                <div className="field"><label>Customer Name</label><input value={form.customerName} onChange={(e) => setField("customerName", e.target.value)} disabled={!form.hasCustomer} /></div>
                <div className="field"><label>Customer Address</label><input value={form.customerAddress} onChange={(e) => setField("customerAddress", e.target.value)} disabled={!form.hasCustomer} /></div>
                <div className="field"><label>Policy Address</label><input value={form.policyAddress} onChange={(e) => setField("policyAddress", e.target.value)} /></div>
                <div className="field"><label>Has Customer</label><input type="checkbox" checked={form.hasCustomer} onChange={(e) => setField("hasCustomer", e.target.checked)} /></div>
                <div className="field"><label>Duplicate Candidate</label><input type="checkbox" checked={form.duplicateCustomerCandidate} onChange={(e) => setField("duplicateCustomerCandidate", e.target.checked)} /></div>
                <div className="field"><label>Billing Active</label><input type="checkbox" checked={form.billingActive} onChange={(e) => setField("billingActive", e.target.checked)} /></div>
                <div className="field"><label>Configuration Valid</label><input type="checkbox" checked={form.configValid} onChange={(e) => setField("configValid", e.target.checked)} /></div>
              </div>
              <div className="actions">
                <button className="btn-primary" onClick={createPolicy}>Create Policy</button>
                <button className="btn-secondary" onClick={updatePolicy}>Update Selected</button>
                <button className="btn-ghost" onClick={() => runPolicy() } disabled={running}>{running ? "Running..." : "Validate Policy"}</button>
                <button className="btn-ghost" onClick={runAllPolicies} disabled={running || policies.length === 0}>Run All Policies</button>
                <button className="btn-secondary" onClick={exportSelectedSnapshot} disabled={!selectedPolicyId}>Export Snapshot</button>
                <button className="mini danger" onClick={deleteSelectedPolicy} disabled={!selectedPolicyId}>Delete Selected</button>
                <button className="mini danger" onClick={resetPlatform}>Reset Platform</button>
              </div>

              <div className="workflow-strip">
                {workflowNames.map((step, idx) => (
                  <div key={step} className={`flow-step ${workflowStep >= idx ? "active" : ""}`}>{step}</div>
                ))}
              </div>
              <div className="log-box">
                {workflowLogs.length === 0 && <div className="small-note">Workflow logs appear here during execution.</div>}
                {workflowLogs.map((log, idx) => <div key={idx}>[{idx + 1}] {log}</div>)}
              </div>
            </section>

            <section className="panel">
              <h2>Policies</h2>
              <div className="toolbar-row">
                <input
                  placeholder="Search policy id, status, customer"
                  value={policySearch}
                  onChange={(e) => setPolicySearch(e.target.value)}
                />
                <select value={policySort} onChange={(e) => setPolicySort(e.target.value)}>
                  <option value="updated_desc">Sort: Recently Updated</option>
                  <option value="created_desc">Sort: Recently Created</option>
                  <option value="score_desc">Sort: Score High to Low</option>
                  <option value="score_asc">Sort: Score Low to High</option>
                  <option value="status">Sort: Status</option>
                </select>
                <div className="small-note">Showing {visiblePolicies.length} of {policies.length}</div>
              </div>
              <div className="table-wrap">
                <table>
                  <thead><tr><th>ID</th><th>Status</th><th>Score</th><th>Updated</th><th>Run</th><th>Status Flow</th><th>Action</th></tr></thead>
                  <tbody>
                    {visiblePolicies.map((p) => (
                      <tr key={p.policyId}>
                        <td>{p.policyId}</td>
                        <td><StatusBadge value={p.status} /></td>
                        <td>{p.scoreAfter}</td>
                        <td>{p.updatedAt ? formatRelativeTime(p.updatedAt) : "-"}</td>
                        <td>{p.lastRunAt ? new Date(p.lastRunAt).toLocaleTimeString() : "-"}</td>
                        <td className="flow-mini">{(p.statusHistory || []).map((s) => s.status).join(" → ") || "NEW"}</td>
                        <td>
                          <button className="mini" onClick={() => selectPolicy(p)}>Select</button>
                          <button className="mini" onClick={() => runPolicy(p.policyId)}>Run</button>
                          <button className="mini danger" onClick={async () => {
                            const confirmed = window.confirm(`Delete ${p.policyId}?`);
                            if (!confirmed) {
                              return;
                            }
                            const response = await fetch(`/api/platform/policies/${p.policyId}`, { method: "DELETE" });
                            if (!response.ok) {
                              setStatusText(`Delete failed: ${p.policyId}`);
                              return;
                            }
                            if (selectedPolicyId === p.policyId) {
                              setSelectedPolicyId("");
                              setForm(defaultForm);
                            }
                            setStatusText(`Deleted: ${p.policyId}`);
                            await bootstrap();
                            await fetchIssues();
                            await fetchCorrections();
                            await fetchAudits();
                          }}>Delete</button>
                        </td>
                      </tr>
                    ))}
                    {visiblePolicies.length === 0 && <tr><td colSpan="7">No policies match the current search</td></tr>}
                  </tbody>
                </table>
              </div>
            </section>
          </div>
        );

        const renderValidationCenter = () => (
          <section className="panel">
            <h2>Validation Center</h2>
            <div className="filters-row">
              <input placeholder="Search by rule/policy/description" value={validationFilters.search} onChange={(e) => setValidationFilters((p) => ({ ...p, search: e.target.value }))} />
              <select value={validationFilters.severity} onChange={(e) => setValidationFilters((p) => ({ ...p, severity: e.target.value }))}>
                <option value="">All Severity</option><option>Critical</option><option>High</option><option>Medium</option><option>Low</option>
              </select>
              <select value={validationFilters.status} onChange={(e) => setValidationFilters((p) => ({ ...p, status: e.target.value }))}>
                <option value="">All Status</option><option>Open</option><option>Resolved</option><option>Suggested</option><option>Blocked</option><option>Approved</option><option>Rejected</option>
              </select>
              <select value={validationFilters.policyId} onChange={(e) => setValidationFilters((p) => ({ ...p, policyId: e.target.value }))}>
                <option value="">All Policies</option>
                {policies.map((p) => <option key={p.policyId} value={p.policyId}>{p.policyId}</option>)}
              </select>
              <button className="btn-ghost" onClick={() => fetchIssues(validationFilters)}>Apply Filters</button>
              <button className="btn-secondary" onClick={clearValidationFilters}>Clear</button>
            </div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Policy</th><th>Rule</th><th>Severity</th><th>Status</th><th>Description</th></tr></thead>
                <tbody>
                  {issues.map((issue, idx) => (
                    <tr key={`${issue.policyId}-${issue.ruleId}-${idx}`}>
                      <td>{issue.policyId}</td>
                      <td>{issue.ruleId}</td>
                      <td><SeverityBadge value={issue.severity} /></td>
                      <td><StatusBadge value={issue.status} /></td>
                      <td>{issue.description}</td>
                    </tr>
                  ))}
                  {issues.length === 0 && <tr><td colSpan="5">No issues for selected filters</td></tr>}
                </tbody>
              </table>
            </div>
          </section>
        );

        const renderCorrectionCenter = () => {
          const suggestions = issues.filter((i) => i.status === "Suggested");
          return (
            <div className="module-grid two-col">
              <section className="panel">
                <h2>Corrections Applied</h2>
                <div className="table-wrap">
                  <table>
                    <thead><tr><th>Policy</th><th>Type</th><th>Action</th><th>By</th></tr></thead>
                    <tbody>
                      {corrections.map((c, idx) => (
                        <tr key={`${c.policyId}-${idx}`}>
                          <td>{c.policyId}</td>
                          <td>{c.correctionType}</td>
                          <td>{c.actionTaken}</td>
                          <td>{c.correctedBy}</td>
                        </tr>
                      ))}
                      {corrections.length === 0 && <tr><td colSpan="4">No corrections yet</td></tr>}
                    </tbody>
                  </table>
                </div>
              </section>

              <section className="panel">
                <h2>Suggestion Queue ({suggestions.length})</h2>
                <div className="table-wrap">
                  <table>
                    <thead><tr><th>Policy</th><th>Rule</th><th>Status</th><th>Decision</th></tr></thead>
                    <tbody>
                      {suggestions.map((s, idx) => (
                        <tr key={`${s.policyId}-${s.issueKey}-${idx}`}>
                          <td>{s.policyId}</td>
                          <td>{s.ruleId}</td>
                          <td><StatusBadge value={s.status} /></td>
                          <td>
                            <button className="mini" onClick={() => actOnSuggestion(s.policyId, s.issueKey, "approve")}>Approve</button>
                            <button className="mini danger" onClick={() => actOnSuggestion(s.policyId, s.issueKey, "reject")}>Reject</button>
                          </td>
                        </tr>
                      ))}
                      {suggestions.length === 0 && <tr><td colSpan="4">No suggestions pending</td></tr>}
                    </tbody>
                  </table>
                </div>
              </section>
            </div>
          );
        };

        const renderAuditLogs = () => (
          <section className="panel">
            <h2>Audit Timeline</h2>
            <div className="actions"><button className="btn-ghost" onClick={() => fetchAudits(selectedPolicyId)}>Filter Selected Policy</button><button className="btn-secondary" onClick={() => fetchAudits()}>Show All</button><button className="btn-secondary" onClick={exportAuditLog}>Export Audit JSON</button></div>
            <div className="timeline">
              {auditEvents.map((event) => (
                <div className={`timeline-item mod-${String(event.module || "").toLowerCase().replace(/[^a-z]/g, "")}`} key={event.eventId}>
                  <div className="t-time">{new Date(event.timestamp).toLocaleTimeString()}</div>
                  <div>
                    <div className="t-message"><span className="t-icon">{moduleIcon(event.module)}</span> [{event.module}] {event.message}</div>
                    <div className="small-note">Policy: {event.policyId}</div>
                  </div>
                </div>
              ))}
              {auditEvents.length === 0 && <div className="small-note">No audit events yet.</div>}
            </div>
          </section>
        );

        const renderRuleConfig = () => (
          <section className="panel">
            <h2>Rule Configuration</h2>
            <div className="actions">
              <label className="inline-check"><input type="checkbox" checked={autoRerunRules} onChange={(e) => setAutoRerunRules(e.target.checked)} /> Auto re-run selected policy after rule change</label>
              <button className="btn-ghost" onClick={() => runPolicy(selectedPolicyId)} disabled={!selectedPolicyId || running}>Re-run Selected Policy</button>
              <button className="btn-secondary" onClick={resetRulesToDefault}>Restore Rule Defaults</button>
            </div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Rule</th><th>Layer</th><th>Severity</th><th>Enabled</th></tr></thead>
                <tbody>
                  {rules.map((rule) => (
                    <tr key={rule.ruleId}>
                      <td><strong>{rule.ruleId}</strong><div className="small-note">{rule.name}</div></td>
                      <td>{rule.layer}</td>
                      <td>
                        <select value={rule.severity} onChange={(e) => updateRule(rule.ruleId, { severity: e.target.value })}>
                          <option>Critical</option><option>High</option><option>Medium</option><option>Low</option>
                        </select>
                      </td>
                      <td>
                        <input type="checkbox" checked={rule.enabled} onChange={(e) => updateRule(rule.ruleId, { enabled: e.target.checked })} />
                      </td>
                    </tr>
                  ))}
                  {rules.length === 0 && <tr><td colSpan="4">No rules found</td></tr>}
                </tbody>
              </table>
            </div>
          </section>
        );

        const moduleContent = {
          dashboard: renderDashboard(),
          workbench: renderWorkbench(),
          validation: renderValidationCenter(),
          corrections: renderCorrectionCenter(),
          audit: renderAuditLogs(),
          rules: renderRuleConfig()
        };

        return (
          <div className="platform-shell">
            <header className="global-header">
              <div className="global-left">
                <div className="global-brand">
                  <div className="suite-title">PolicyCenter</div>
                </div>
                <nav className="suite-menu">
                  {suiteMenus.map((menu) => (
                    <button key={menu} className="suite-menu-item" type="button">{menu}</button>
                  ))}
                </nav>
              </div>
              <div className="global-right">
                <span className="meta-pill">{running || demoModeRunning ? "Running" : "Ready"}</span>
                <input className="header-search" placeholder="Go to (Alt+/)" />
              </div>
            </header>

            <aside className="sidebar">
              <button className="actions-launcher" type="button">Actions</button>
              <div className="tenant-card">Enigma Fire & Casualty</div>
              <div className="side-group-title">Policy Integrity</div>
              <nav className="module-nav">
                {modules.map((item) => (
                  <button key={item.key} className={`nav-item ${activeModule === item.key ? "active" : ""}`} onClick={() => setActiveModule(item.key)}>
                    {item.label}
                  </button>
                ))}
              </nav>
            </aside>

            <main className="main-content">
              <header className="workspace-header">
                <div className="workspace-title-group">
                  <div className="workspace-path">Home / PolicyCenter / Integrity</div>
                  <h1>{activeModuleDef.label}</h1>
                  <p>{moduleDescriptions[activeModuleDef.key]}</p>
                </div>
                <div className="workspace-actions">
                  <button className="btn-primary" onClick={runDemoMode} disabled={demoModeRunning || running}>
                    {demoModeRunning ? "Demo Running..." : "Run Demo"}
                  </button>
                  <button className="btn-ghost" onClick={runAllPolicies} disabled={running || policies.length === 0}>Run All</button>
                  <button className="btn-secondary" onClick={exportSelectedSnapshot} disabled={!selectedPolicyId}>Export Snapshot</button>
                </div>
              </header>

              <div className="workspace-tabs">
                {modules.map((item) => (
                  <button
                    key={item.key}
                    className={`workspace-tab ${activeModule === item.key ? "active" : ""}`}
                    type="button"
                    onClick={() => setActiveModule(item.key)}
                  >
                    {item.label}
                  </button>
                ))}
              </div>

              <section className="context-strip">
                <div className="context-card">
                  <span>Selected Policy</span>
                  <strong>{selectedPolicyId || "None"}</strong>
                </div>
                <div className="context-card">
                  <span>Status</span>
                  <strong>{selectedPolicy?.status || "Not Selected"}</strong>
                </div>
                <div className="context-card">
                  <span>Current Score</span>
                  <strong>{selectedPolicy ? selectedPolicy.scoreAfter : "-"}</strong>
                </div>
                <div className="context-card">
                  <span>Open Issues</span>
                  <strong>{selectedPolicy ? selectedPolicyIssueCount : 0}</strong>
                </div>
                <div className="context-card">
                  <span>Suggestions</span>
                  <strong>{selectedPolicy ? selectedPolicySuggestionCount : 0}</strong>
                </div>
              </section>

              <div className="small-note">Status: {statusText} | Scenario: {selectedDemoCase || "manual"}</div>
              {ruleImpactMessage && <div className="rule-impact-msg">{ruleImpactMessage}</div>}
              {moduleContent[activeModule]}
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
