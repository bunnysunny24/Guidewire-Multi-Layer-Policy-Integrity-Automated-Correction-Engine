                        type="checkbox"
                        checked={selectedIntegrationTargets.includes(target)}
                        onChange={() => toggleIntegrationTarget(target)}
                      />
                      {target}
                    </label>
                  ))}
                </div>
                <div className="actions">
                  <button className="btn-secondary" onClick={publishIntegrationForSelectedPolicy} disabled={!selectedPolicyId}>Publish Integration Payload</button>
                </div>

                <div className="filters-row">
                  <input
                    placeholder="Search event id, policy, target"
                    value={integrationFilters.search}
                    onChange={(e) => setIntegrationFilters((prev) => ({ ...prev, search: e.target.value }))}
                  />
                  <select value={integrationFilters.policyId} onChange={(e) => setIntegrationFilters((prev) => ({ ...prev, policyId: e.target.value }))}>
                    <option value="">All Policies</option>
                    {policies.map((policy) => <option key={policy.policyId} value={policy.policyId}>{policy.policyId}</option>)}
                  </select>
                  <select value={integrationFilters.targetSystem} onChange={(e) => setIntegrationFilters((prev) => ({ ...prev, targetSystem: e.target.value }))}>
                    <option value="">All Targets</option>
                    {integrationTargetOptions.map((target) => <option key={target} value={target}>{target}</option>)}
                  </select>
                  <select value={integrationFilters.status} onChange={(e) => setIntegrationFilters((prev) => ({ ...prev, status: e.target.value }))}>
                    <option value="">All Status</option>
                    {integrationStatusOptions.map((status) => <option key={status} value={status}>{status}</option>)}
                  </select>
                  <button className="btn-secondary" onClick={clearIntegrationFilters}>Clear</button>
                </div>
                <div className="small-note">Integration Event Stream: showing {recentIntegrationEvents.length} filtered records</div>

                <div className="table-wrap">
                  <table>
                    <thead><tr><th>Event</th><th>Policy</th><th>Target</th><th>Status</th><th>Time</th></tr></thead>
                    <tbody>
                      {recentIntegrationEvents.map((event) => (
                        <tr key={event.integrationEventId}>
                          <td>{event.integrationEventId}</td>
                          <td>{event.policyId}</td>
                          <td>{event.targetSystem}</td>
                          <td><StatusBadge value={event.status} /></td>
                          <td>{event.createdAt ? new Date(event.createdAt).toLocaleTimeString() : "-"}</td>
                        </tr>
                      ))}
                      {recentIntegrationEvents.length === 0 && <tr><td colSpan="5">No integration events published yet</td></tr>}
                    </tbody>
                  </table>
                </div>
              </section>
            </div>
          );
        };

        const renderValidationCenter = () => (
          <section className="panel">
            <h2>Validation Center</h2>
            <div className="filters-row">
              <input placeholder="Search by rule/policy/description" value={validationFilters.search} onChange={(e) => setValidationFilters((p) => ({ ...p, search: e.target.value }))} />
              <select value={validationFilters.severity} onChange={(e) => setValidationFilters((p) => ({ ...p, severity: e.target.value }))}>
                <option value="">All Severity</option><option>Critical</option><option>High</option><option>Medium</option><option>Low</option>
              </select>
              <select value={validationFilters.status} onChange={(e) => setValidationFilters((p) => ({ ...p, status: e.target.value }))}>
                <option value="">All Status</option><option>Open</option><option>Resolved</option><option>Suggested</option><option>Blocked</option><option>Approved</option><option>Rejected</option>
              </select>
              <select value={validationFilters.correctionMode} onChange={(e) => setValidationFilters((p) => ({ ...p, correctionMode: e.target.value }))}>
                <option value="">All Modes</option><option>Auto</option><option>Suggested</option><option>Manual</option>
              </select>
              <select value={validationFilters.autoFixable} onChange={(e) => setValidationFilters((p) => ({ ...p, autoFixable: e.target.value }))}>
                <option value="">All Fixability</option><option value="true">Auto-Fixable</option><option value="false">Manual-Only</option>
              </select>
              <input type="number" step="0.01" min="0" max="1" placeholder="Min confidence (0-1)" value={validationFilters.minConfidence} onChange={(e) => setValidationFilters((p) => ({ ...p, minConfidence: e.target.value }))} />
              <input type="number" step="0.01" min="0" max="1" placeholder="Max confidence (0-1)" value={validationFilters.maxConfidence} onChange={(e) => setValidationFilters((p) => ({ ...p, maxConfidence: e.target.value }))} />
              <select value={validationFilters.policyId} onChange={(e) => setValidationFilters((p) => ({ ...p, policyId: e.target.value }))}>
                <option value="">All Policies</option>
                {policies.map((p) => <option key={p.policyId} value={p.policyId}>{p.policyId}</option>)}
              </select>
              <button className="btn-ghost" onClick={() => fetchIssues(validationFilters)}>Apply Filters</button>
              <button className="btn-secondary" onClick={clearValidationFilters}>Clear</button>
            </div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Policy</th><th>Rule</th><th>Severity</th><th>Status</th><th>Description</th></tr></thead>
                <tbody>
                  {issues.map((issue, idx) => (
                    <tr key={`${issue.policyId}-${issue.ruleId}-${idx}`}>
                      <td>{issue.policyId}</td>
                      <td>{issue.ruleId}</td>
                      <td><SeverityBadge value={issue.severity} /></td>
                      <td><StatusBadge value={issue.status} /></td>
                      <td>{issue.description}</td>
                    </tr>
                  ))}
                  {issues.length === 0 && <tr><td colSpan="5">No issues for selected filters</td></tr>}
                </tbody>
              </table>
            </div>
          </section>
        );

        const renderCorrectionCenter = () => {
          const queueSearch = String(correctionFilters.search || "").trim().toLowerCase();
          const matchesQueueFilters = (issue) => {
            if (correctionFilters.policyId && issue.policyId !== correctionFilters.policyId) {
              return false;
            }
            if (correctionFilters.severity && issue.severity !== correctionFilters.severity) {
              return false;
            }
            if (correctionFilters.ruleId && !String(issue.ruleId || "").includes(correctionFilters.ruleId)) {
              return false;
            }
            if (!queueSearch) {
              return true;
            }
            return (
              String(issue.policyId || "").toLowerCase().includes(queueSearch) ||
              String(issue.ruleId || "").toLowerCase().includes(queueSearch) ||
              String(issue.description || "").toLowerCase().includes(queueSearch)
            );
          };

          const suggestions = issues.filter((i) => i.status === "Suggested" && matchesQueueFilters(i));
          const manualQueue = issues.filter((i) =>
            (i.status === "Blocked" || (i.correctionMode === "Manual" && i.status === "Open")) && matchesQueueFilters(i)
          );

          return (
            <div className="module-grid two-col">
              <section className="panel">
                <h2>Corrections Applied ({filteredCorrections.length})</h2>
                <div className="table-wrap">
                  <table>
                    <thead><tr><th>Policy</th><th>Type</th><th>Action</th><th>By</th></tr></thead>
                    <tbody>
                      {filteredCorrections.map((c, idx) => (
                        <tr key={`${c.policyId}-${idx}`}>
                          <td>{c.policyId}</td>
                          <td>{c.correctionType}</td>
                          <td>{c.actionTaken}</td>
                          <td>{c.correctedBy}</td>
                        </tr>
                      ))}
                      {filteredCorrections.length === 0 && <tr><td colSpan="4">No corrections for selected filters</td></tr>}
                    </tbody>
                  </table>
                </div>
              </section>

              <section className="panel">
                <h2>Queue Filters and Bulk Actions</h2>
                <div className="filters-row">
                  <input
                    placeholder="Search rule/policy/description"
                    value={correctionFilters.search}
                    onChange={(e) => setCorrectionFilters((prev) => ({ ...prev, search: e.target.value }))}
                  />
                  <select value={correctionFilters.policyId} onChange={(e) => setCorrectionFilters((prev) => ({ ...prev, policyId: e.target.value }))}>
                    <option value="">All Policies</option>
                    {policies.map((policy) => <option key={policy.policyId} value={policy.policyId}>{policy.policyId}</option>)}
                  </select>
                  <select value={correctionFilters.severity} onChange={(e) => setCorrectionFilters((prev) => ({ ...prev, severity: e.target.value }))}>
                    <option value="">All Severity</option><option>Critical</option><option>High</option><option>Medium</option><option>Low</option>
                  </select>
                  <input
                    placeholder="Rule id contains"
                    value={correctionFilters.ruleId}
                    onChange={(e) => setCorrectionFilters((prev) => ({ ...prev, ruleId: e.target.value }))}
                  />
                  <button className="btn-secondary" onClick={clearCorrectionFilters}>Clear</button>
                </div>
                <div className="actions">
                  <button
                    className="btn-ghost"
                    onClick={() => runBulkIssueAction(suggestions, "approve", "Bulk approve complete")}
                    disabled={running || suggestions.length === 0}
                  >
                    Approve Visible Suggestions
                  </button>
                  <button
                    className="btn-secondary"
                    onClick={() => runBulkIssueAction(manualQueue, "resolve", "Bulk manual resolution complete")}
                    disabled={running || manualQueue.length === 0}
                  >
                    Resolve Visible Manual Queue
                  </button>
                </div>

                <h2>Suggestion Queue ({suggestions.length})</h2>
                <div className="table-wrap">
                  <table>
                    <thead><tr><th>Policy</th><th>Rule</th><th>Severity</th><th>Status</th><th>Decision</th></tr></thead>
                    <tbody>
                      {suggestions.map((s, idx) => (
                        <tr key={`${s.policyId}-${s.issueKey}-${idx}`}>
                          <td>{s.policyId}</td>
                          <td>{s.ruleId}</td>
                          <td><SeverityBadge value={s.severity} /></td>
                          <td><StatusBadge value={s.status} /></td>
                          <td>
                            <button className="mini" onClick={() => actOnSuggestion(s.policyId, s.issueKey, "approve")}>Approve</button>
                            <button className="mini danger" onClick={() => actOnSuggestion(s.policyId, s.issueKey, "reject")}>Reject</button>
                          </td>
                        </tr>
                      ))}
                      {suggestions.length === 0 && <tr><td colSpan="5">No suggestions pending</td></tr>}
                    </tbody>
                  </table>
                </div>

                <h2 style={{ marginTop: "1rem" }}>Manual Resolution Queue ({manualQueue.length})</h2>
                <div className="table-wrap">
                  <table>
                    <thead><tr><th>Policy</th><th>Rule</th><th>Severity</th><th>Status</th><th>Decision</th></tr></thead>
                    <tbody>
                      {manualQueue.map((m, idx) => (
                        <tr key={`${m.policyId}-${m.issueKey}-manual-${idx}`}>
                          <td>{m.policyId}</td>
                          <td>{m.ruleId}</td>
                          <td><SeverityBadge value={m.severity} /></td>
                          <td><StatusBadge value={m.status} /></td>
                          <td>
                            <button className="mini" onClick={() => actOnSuggestion(m.policyId, m.issueKey, "resolve")}>Resolve</button>
                          </td>
                        </tr>
                      ))}
                      {manualQueue.length === 0 && <tr><td colSpan="5">No manual issues pending</td></tr>}
                    </tbody>
                  </table>
                </div>
              </section>
            </div>
          );
        };

        const renderAuditLogs = () => (
          <section className="panel">
            <h2>Audit Timeline</h2>
            <div className="filters-row">
              <input
                placeholder="Search event/module/message/policy"
                value={auditFilters.search}
                onChange={(e) => setAuditFilters((prev) => ({ ...prev, search: e.target.value }))}
              />
              <select value={auditFilters.policyId} onChange={(e) => setAuditFilters((prev) => ({ ...prev, policyId: e.target.value }))}>
                <option value="">All Policies</option>
                {policies.map((policy) => <option key={policy.policyId} value={policy.policyId}>{policy.policyId}</option>)}
              </select>
              <select value={auditFilters.module} onChange={(e) => setAuditFilters((prev) => ({ ...prev, module: e.target.value }))}>
                <option value="">All Modules</option>
                {auditModuleOptions.map((moduleName) => <option key={moduleName} value={moduleName}>{moduleName}</option>)}
              </select>
              <input type="date" value={auditFilters.fromDate} onChange={(e) => setAuditFilters((prev) => ({ ...prev, fromDate: e.target.value }))} />
              <input type="date" value={auditFilters.toDate} onChange={(e) => setAuditFilters((prev) => ({ ...prev, toDate: e.target.value }))} />
              <button className="btn-ghost" onClick={() => setAuditFilters((prev) => ({ ...prev, policyId: selectedPolicyId || "" }))} disabled={!selectedPolicyId}>Use Selected Policy</button>
              <button className="btn-secondary" onClick={clearAuditFilters}>Clear Filters</button>
              <button className="btn-secondary" onClick={() => fetchAudits()}>Refresh</button>
              <button className="btn-secondary" onClick={exportAuditLog}>Export Filtered JSON</button>
            </div>
            <div className="small-note">Showing {filteredAuditEvents.length} audit events after filters</div>
            <div className="timeline">
              {filteredAuditEvents.map((event) => (
                <div className={`timeline-item mod-${String(event.module || "").toLowerCase().replace(/[^a-z]/g, "")}`} key={event.eventId}>
                  <div className="t-time">{new Date(event.timestamp).toLocaleTimeString()}</div>
                  <div>
                    <div className="t-message"><span className="t-icon">{moduleIcon(event.module)}</span> [{event.module}] {event.message}</div>
                    <div className="small-note">Policy: {event.policyId}</div>
                  </div>
                </div>
              ))}
              {filteredAuditEvents.length === 0 && <div className="small-note">No audit events for selected filters.</div>}
            </div>
          </section>
        );

        const renderRuleConfig = () => (
          <section className="panel">
            <h2>Rule Configuration</h2>
            <div className="actions">
              <label className="inline-check"><input type="checkbox" checked={autoRerunRules} onChange={(e) => setAutoRerunRules(e.target.checked)} /> Auto re-run selected policy after rule change</label>
              <button className="btn-ghost" onClick={() => runPolicy(selectedPolicyId)} disabled={!selectedPolicyId || running}>Re-run Selected Policy</button>
              <button className="btn-secondary" onClick={resetRulesToDefault}>Restore Rule Defaults</button>
            </div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Rule</th><th>Layer</th><th>Severity</th><th>Enabled</th></tr></thead>
                <tbody>
                  {rules.map((rule) => (
                    <tr key={rule.ruleId}>
                      <td><strong>{rule.ruleId}</strong><div className="small-note">{rule.name}</div></td>
                      <td>{rule.layer}</td>
                      <td>
                        <select value={rule.severity} onChange={(e) => updateRule(rule.ruleId, { severity: e.target.value })}>
                          <option>Critical</option><option>High</option><option>Medium</option><option>Low</option>
                        </select>
                      </td>
                      <td>
                        <input type="checkbox" checked={rule.enabled} onChange={(e) => updateRule(rule.ruleId, { enabled: e.target.checked })} />
                      </td>
                    </tr>
                  ))}
                  {rules.length === 0 && <tr><td colSpan="4">No rules found</td></tr>}
                </tbody>
              </table>
            </div>
          </section>
        );

        const moduleContent = {
          dashboard: renderDashboard(),
          adoption: renderAdoptionStudio(),
          workbench: renderWorkbench(),
          validation: renderValidationCenter(),
          corrections: renderCorrectionCenter(),
          audit: renderAuditLogs(),
          rules: renderRuleConfig()
        };

        return (
          <div className="platform-shell">
            <header className="global-header">
              <div className="global-left">
                <div className="global-brand">
                  <div className="suite-title">PolicyCenter</div>
                </div>
                <nav className="suite-menu">
                  {suiteMenus.map((menu) => (
                    <button key={menu} className="suite-menu-item" type="button">{menu}</button>
                  ))}
                </nav>
              </div>
              <div className="global-right">
                <span className="meta-pill">{running || demoModeRunning ? "Running" : "Ready"}</span>
                <input className="header-search" placeholder="Go to (Alt+/)" />
              </div>
            </header>

            <aside className="sidebar">
              <button className="actions-launcher" type="button">Actions</button>
              <div className="tenant-card">Enigma Fire & Casualty</div>
              <div className="side-group-title">Policy Integrity</div>
              <nav className="module-nav">
                {modules.map((item) => (
                  <button key={item.key} className={`nav-item ${activeModule === item.key ? "active" : ""}`} onClick={() => setActiveModule(item.key)}>
                    {item.label}
                  </button>
                ))}
              </nav>
            </aside>

            <main className="main-content">
              <header className="workspace-header">
                <div className="workspace-title-group">
                  <div className="workspace-path">Home / PolicyCenter / Integrity</div>
                  <h1>{activeModuleDef.label}</h1>
                  <p>{moduleDescriptions[activeModuleDef.key]}</p>
                </div>
                <div className="workspace-actions">
                  <button className="btn-primary" onClick={runDemoMode} disabled={demoModeRunning || running}>
                    {demoModeRunning ? "Demo Running..." : "Run Demo"}
                  </button>
                  <button className="btn-ghost" onClick={runAllPolicies} disabled={running || policies.length === 0}>Run All</button>
                  <button className="btn-secondary" onClick={exportSelectedSnapshot} disabled={!selectedPolicyId}>Export Snapshot</button>
                </div>
              </header>

              <div className="workspace-tabs">
                {modules.map((item) => (
                  <button
                    key={item.key}
                    className={`workspace-tab ${activeModule === item.key ? "active" : ""}`}
                    type="button"
                    onClick={() => setActiveModule(item.key)}
                  >
                    {item.label}
                  </button>
                ))}
              </div>

              <section className="context-strip">
                <div className="context-card">
                  <span>Selected Policy</span>
                  <strong>{selectedPolicyId || "None"}</strong>
                </div>
                <div className="context-card">
                  <span>Status</span>
                  <strong>{selectedPolicy?.status || "Not Selected"}</strong>
                </div>
                <div className="context-card">
                  <span>Current Score</span>
                  <strong>{selectedPolicy ? selectedPolicy.scoreAfter : "-"}</strong>
                </div>
                <div className="context-card">
                  <span>Open Issues</span>
                  <strong>{selectedPolicy ? selectedPolicyIssueCount : 0}</strong>
                </div>
                <div className="context-card">
                  <span>Suggestions</span>
                  <strong>{selectedPolicy ? selectedPolicySuggestionCount : 0}</strong>
                </div>
                <div className="context-card">
                  <span>Governance Profile</span>
                  <strong>{governance.mode || "-"}</strong>
                </div>
              </section>

              <div className="small-note">Status: {statusText} | Scenario: {selectedDemoCase || "manual"}</div>
              {ruleImpactMessage && <div className="rule-impact-msg">{ruleImpactMessage}</div>}
              {moduleContent[activeModule]}
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
