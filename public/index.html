<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Policy Integrity Management Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useMemo, useRef } = React;

      const modules = [
        { key: "dashboard", label: "Dashboard" },
        { key: "adoption", label: "Adoption Studio" },
        { key: "workbench", label: "Policy Workbench" },
        { key: "validation", label: "Validation Center" },
        { key: "corrections", label: "Correction Center" },
        { key: "audit", label: "Audit Logs" },
        { key: "rules", label: "Rule Configuration" }
      ];

      const suiteMenus = ["Desktop", "Account", "Policy", "Contact", "Reinsurance", "Search", "Team"];

      const moduleDescriptions = {
        dashboard: "Monitor policy quality, correction outcomes, and enterprise risk posture.",
        adoption: "Roll out modules safely with governance profiles, ROI proof, and integration readiness evidence.",
        workbench: "Create and manage policy records before validation and governance execution.",
        validation: "Review detected issues across all validation layers and policy records.",
        corrections: "Track applied corrections and clear suggestion queues with controlled actions.",
        audit: "Inspect the timeline of system decisions, rule triggers, and correction events.",
        rules: "Configure validation rules, severity weightings, and execution governance settings."
      };

      const governanceModes = [
        { value: "validation-only", label: "Validation Only" },
        { value: "human-in-loop", label: "Human-in-the-Loop" },
        { value: "full-automation", label: "Full Automation" }
      ];

      const integrationTargets = ["PolicyCenter", "BillingCenter"];

      const defaultGovernance = {
        mode: "full-automation",
        enableValidation: true,
        enableCorrection: true,
        enableRevalidation: true,
        autoApplyCorrections: true,
        autoApplyMinConfidence: 0.9,
        emitIntegrationEvents: true
      };

      const defaultRoiAssumptions = {
        minutesPerAutoCorrection: 12,
        reviewMinutesPerSuggestedIssue: 6,
        blockedCaseCostAvoided: 220
      };

      const todayDate = new Date();
      const defaultEffectiveDate = todayDate.toISOString().slice(0, 10);
      const defaultExpirationDate = new Date(
        todayDate.getFullYear() + 1,
        todayDate.getMonth(),
        todayDate.getDate()
      ).toISOString().slice(0, 10);

      const defaultForm = {
        accountNumber: "ACC-1001",
        lineOfBusiness: "PersonalAuto",
        productCode: "PA_STD",
        offering: "Standard",
        termType: "Annual",
        effectiveDate: defaultEffectiveDate,
        expirationDate: defaultExpirationDate,
        jurisdiction: "CA",
        producerCode: "PRD-001",
        underwriter: "UW-1",
        submissionChannel: "Portal",
        billingPlan: "Monthly",
        currency: "USD",
        premium: -500,
        coverage: 200000,
        status: "Active",
        hasCustomer: true,
        customerName: "Aarav Sharma",
        customerAddress: "12 Green Street",
        policyAddress: "",
        duplicateCustomerCandidate: true,
        billingActive: false,
        configValid: true,
        actor: "ui.user"
      };

      function wait(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function SeverityBadge({ value }) {
        return <span className={`badge sev-${String(value || "").toLowerCase()}`}>{value}</span>;
      }

      function StatusBadge({ value }) {
        return <span className={`badge st-${String(value || "").toLowerCase()}`}>{value}</span>;
      }

      function moduleIcon(moduleName = "") {
        const module = moduleName.toLowerCase();
        if (module.includes("detect") || module.includes("validation")) {
          return "VAL";
        }
        if (module.includes("correct")) {
          return "FIX";
        }
        if (module.includes("score")) {
          return "SCR";
        }
        if (module.includes("audit")) {
          return "AUD";
        }
        if (module.includes("rules")) {
          return "CFG";
        }
        return "SYS";
      }

      function formatRelativeTime(timestamp) {
        if (!timestamp) {
          return "never";
        }
        const diffSec = Math.max(0, Math.floor((Date.now() - new Date(timestamp).getTime()) / 1000));
        if (diffSec < 60) {
          return `${diffSec}s ago`;
        }
        const diffMin = Math.floor(diffSec / 60);
        if (diffMin < 60) {
          return `${diffMin}m ago`;
        }
        const diffHr = Math.floor(diffMin / 60);
        return `${diffHr}h ago`;
      }

      function ChartPanel({ chartId, type, labels, values, title }) {
        const canvasRef = useRef(null);

        useEffect(() => {
          if (!canvasRef.current || !window.Chart) {
            return undefined;
          }

          const chart = new window.Chart(canvasRef.current, {
            type,
            data: {
              labels,
              datasets: [
                {
                  label: title,
                  data: values,
                  backgroundColor: [
                    "#0f766e",
                    "#0369a1",
                    "#65a30d",
                    "#b45309",
                    "#b91c1c"
                  ],
                  borderColor: "#ffffff",
                  borderWidth: 1
                }
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: type === "pie" || type === "doughnut" }
              }
            }
          });

          return () => chart.destroy();
        }, [type, labels.join("|"), values.join("|")]);

        return (
          <div className="chart-card">
            <div className="chart-title">{title}</div>
            <div className="chart-body"><canvas id={chartId} ref={canvasRef}></canvas></div>
          </div>
        );
      }

      function App() {
        const [activeModule, setActiveModule] = useState("dashboard");
        const [form, setForm] = useState(defaultForm);
        const [policies, setPolicies] = useState([]);
        const [rules, setRules] = useState([]);
        const [auditEvents, setAuditEvents] = useState([]);
        const [issues, setIssues] = useState([]);
        const [corrections, setCorrections] = useState([]);
        const [selectedPolicyId, setSelectedPolicyId] = useState("");
        const [runResult, setRunResult] = useState(null);
        const [statusText, setStatusText] = useState("Ready");
        const [running, setRunning] = useState(false);
        const [workflowStep, setWorkflowStep] = useState(-1);
        const [workflowLogs, setWorkflowLogs] = useState([]);
        const [autoRerunRules, setAutoRerunRules] = useState(true);
        const [lastRunAt, setLastRunAt] = useState(null);
        const [demoModeRunning, setDemoModeRunning] = useState(false);
        const [ruleImpactMessage, setRuleImpactMessage] = useState("");
        const [demoCases, setDemoCases] = useState([]);
        const [selectedDemoCase, setSelectedDemoCase] = useState("");
        const [batchRunSummary, setBatchRunSummary] = useState(null);
        const [policySearch, setPolicySearch] = useState("");
        const [policySort, setPolicySort] = useState("updated_desc");
        const [policyFilters, setPolicyFilters] = useState({
          lifecycleStatus: "",
          policyState: "",
          lineOfBusiness: "",
          producerCode: "",
          jurisdiction: "",
          hasCustomer: "",
          effectiveFrom: "",
          effectiveTo: ""
        });
        const [governance, setGovernance] = useState(defaultGovernance);
        const [roiAssumptions, setRoiAssumptions] = useState(defaultRoiAssumptions);
        const [roiSummary, setRoiSummary] = useState(null);
        const [integrationEventLog, setIntegrationEventLog] = useState([]);
        const [selectedIntegrationTargets, setSelectedIntegrationTargets] = useState(integrationTargets);
        const [integrationFilters, setIntegrationFilters] = useState({
          search: "",
          policyId: "",
          targetSystem: "",
          status: ""
        });
        const [correctionFilters, setCorrectionFilters] = useState({
          search: "",
          policyId: "",
          severity: "",
          ruleId: ""
        });
        const [auditFilters, setAuditFilters] = useState({
          search: "",
          policyId: "",
          module: "",
          fromDate: "",
          toDate: ""
        });
        const [validationFilters, setValidationFilters] = useState({
          severity: "",
          status: "",
          correctionMode: "",
          autoFixable: "",
          minConfidence: "",
          maxConfidence: "",
          ruleId: "",
          policyId: "",
          search: ""
        });

        useEffect(() => {
          bootstrap();
          fetchIssues();
          fetchCorrections();
          fetchAudits();
          fetchDemoCases();
        }, []);

        async function bootstrap() {
          const res = await fetch("/api/platform/bootstrap");
          const data = await res.json();
          setPolicies(data.policies || []);
          setRules(data.rules || []);
          setAuditEvents(data.auditEvents || []);
          setGovernance(data.governance || defaultGovernance);
          setRoiAssumptions(data.roiAssumptions || defaultRoiAssumptions);
          setRoiSummary(data.roi || null);
          setIntegrationEventLog(data.integrationEvents || []);
          if (!selectedPolicyId && data.policies && data.policies.length > 0) {
            setSelectedPolicyId(data.policies[0].policyId);
            setForm(normalizePolicyInput(data.policies[0].input));
          }
        }

        async function fetchIssues(filters = validationFilters) {
          const params = new URLSearchParams();
          Object.entries(filters).forEach(([k, v]) => {
            if (v) {
              params.append(k, v);
            }
          });
          const res = await fetch(`/api/platform/issues?${params.toString()}`);
          const data = await res.json();
          setIssues(data.issues || []);
        }

        async function fetchCorrections() {
          const res = await fetch("/api/platform/corrections");
          const data = await res.json();
          setCorrections(data.corrections || []);
        }

        async function fetchAudits(policyId = "") {
          const q = policyId ? `?policyId=${policyId}` : "";
          const res = await fetch(`/api/platform/audits${q}`);
          const data = await res.json();
          setAuditEvents(data.events || []);
        }

        async function fetchDemoCases() {
          try {
            const res = await fetch("/api/demo-cases");
            if (!res.ok) {
              throw new Error("Failed to load demo cases");
            }
            const data = await res.json();
            const cases = data.cases || [];
            setDemoCases(cases);
            if (!selectedDemoCase && cases.length > 0) {
              setSelectedDemoCase(cases[0].name);
            }
          } catch (error) {
            setStatusText("Unable to load demo cases");
          }
        }

        async function saveGovernance(patch) {
          const response = await fetch("/api/platform/governance", {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(patch)
          });

          if (!response.ok) {
            setStatusText("Failed to update governance profile");
            return;
          }

          const data = await response.json();
          setGovernance(data.governance || defaultGovernance);
          setStatusText(`Governance updated: ${(data.governance || {}).mode || "profile"}`);
          await bootstrap();
        }

        async function saveRoiAssumptions(patch) {
          const response = await fetch("/api/platform/roi-assumptions", {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(patch)
          });

          if (!response.ok) {
            setStatusText("Failed to update ROI assumptions");
            return;
          }

          const data = await response.json();
          setRoiAssumptions(data.assumptions || defaultRoiAssumptions);
          setRoiSummary(data.roi || null);
          setStatusText("ROI assumptions updated");
          await bootstrap();
        }

        function toggleIntegrationTarget(target) {
          setSelectedIntegrationTargets((prev) => {
            if (prev.includes(target)) {
              return prev.filter((item) => item !== target);
            }
            return [...prev, target];
          });
        }

        async function publishIntegrationForSelectedPolicy() {
          if (!selectedPolicyId) {
            setStatusText("Select a policy first");
            return;
          }

          const targets = selectedIntegrationTargets.length > 0
            ? selectedIntegrationTargets
            : integrationTargets;

          const response = await fetch(`/api/platform/integration/policies/${selectedPolicyId}/publish`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              actor: form.actor || "ui.user",
              targets
            })
          });

          if (!response.ok) {
            setStatusText("Failed to publish integration events");
            return;
          }

          const data = await response.json();
          setStatusText(`Integration events published: ${data.count}`);
          await bootstrap();
        }

        function setField(key, value) {
          setForm((prev) => ({ ...prev, [key]: value }));
        }

        function normalizePolicyInput(input = {}) {
          return {
            ...defaultForm,
            ...input
          };
        }

        function validatePolicyInput(input = {}) {
          const requiredFields = [
            ["accountNumber", "Account Number"],
            ["lineOfBusiness", "Line of Business"],
            ["productCode", "Product Code"],
            ["effectiveDate", "Effective Date"],
            ["expirationDate", "Expiration Date"],
            ["producerCode", "Producer Code"],
            ["jurisdiction", "Jurisdiction"]
          ];

          for (const [fieldName, label] of requiredFields) {
            if (!String(input[fieldName] || "").trim()) {
              return `${label} is required`;
            }
          }

          if (input.hasCustomer && !String(input.customerName || "").trim()) {
            return "Customer Name is required when Has Customer is enabled";
          }

          if (input.effectiveDate && input.expirationDate) {
            const effective = new Date(input.effectiveDate).getTime();
            const expiration = new Date(input.expirationDate).getTime();
            if (Number.isFinite(effective) && Number.isFinite(expiration) && expiration <= effective) {
              return "Expiration Date must be after Effective Date";
            }
          }

          return null;
        }

        async function createPolicyWithPayload(payload) {
          const response = await fetch("/api/platform/policies", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error("Create policy failed");
          }

          const created = await response.json();
          return created;
        }

        async function createPolicy() {
          const payload = normalizePolicyInput(form);
          const validationError = validatePolicyInput(payload);
          if (validationError) {
            setStatusText(validationError);
            return;
          }

          const created = await createPolicyWithPayload(payload);
          setSelectedPolicyId(created.policyId);
          setStatusText(`Policy created: ${created.policyId}`);
          await bootstrap();
          await fetchIssues();
          await fetchCorrections();
          await fetchAudits();
        }

        async function updatePolicy() {
          if (!selectedPolicyId) {
            setStatusText("Select a policy first");
            return;
          }

          const payload = normalizePolicyInput(form);
          const validationError = validatePolicyInput(payload);
          if (validationError) {
            setStatusText(validationError);
            return;
          }

          const response = await fetch(`/api/platform/policies/${selectedPolicyId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            setStatusText(`Failed to update policy: ${selectedPolicyId}`);
            return;
          }

          setStatusText(`Policy updated: ${selectedPolicyId}`);
          await bootstrap();
        }

        function loadDemoCase() {
          const match = demoCases.find((item) => item.name === selectedDemoCase);
          if (!match) {
            setStatusText("Choose a demo case first");
            return;
          }

          setForm({
            ...defaultForm,
            ...match.payload,
            policyAddress: match.payload.policyAddress || "",
            actor: "ui.user"
          });
          setStatusText(`Loaded: ${match.name}`);
        }

        async function seedDemoPack() {
          if (demoCases.length === 0) {
            setStatusText("No demo cases available to seed");
            return;
          }

          if (running || demoModeRunning) {
            return;
          }

          setRunning(true);
          setStatusText("Creating demo policy pack...");

          try {
            for (const demoCase of demoCases) {
              const payload = {
                ...defaultForm,
                ...demoCase.payload,
                policyAddress: demoCase.payload.policyAddress || "",
                actor: "demo.seed"
              };
              await createPolicyWithPayload(payload);
            }

            await bootstrap();
            await fetchIssues();
            await fetchCorrections();
            await fetchAudits();
            setStatusText(`Demo pack created: ${demoCases.length} policies`);
          } catch (error) {
            setStatusText("Demo pack creation failed");
          } finally {
            setRunning(false);
          }
        }

        async function runAllPolicies() {
          if (policies.length === 0) {
            setStatusText("Create at least one policy before running all");
            return;
          }

          setRunning(true);
          setStatusText("Running all policies...");

          try {
            const response = await fetch("/api/platform/run-all", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                actor: form.actor || "ui.user",
                profile: governance.mode
              })
            });

            if (!response.ok) {
              throw new Error("Batch run failed");
            }

            const data = await response.json();
            setBatchRunSummary(data.summary || null);
            setStatusText(`Batch run complete: ${data.count} policy(s)`);
            await bootstrap();
            await fetchIssues();
            await fetchCorrections();
            await fetchAudits();
            setActiveModule("dashboard");
          } catch (error) {
            setStatusText("Batch run failed");
          } finally {
            setRunning(false);
          }
        }

        async function deleteSelectedPolicy() {
          if (!selectedPolicyId) {
            setStatusText("Select a policy first");
            return;
          }

          const confirmed = window.confirm(`Delete ${selectedPolicyId}? This cannot be undone.`);
          if (!confirmed) {
            return;
          }

          const response = await fetch(`/api/platform/policies/${selectedPolicyId}`, {
            method: "DELETE"
          });

          if (!response.ok) {
            setStatusText("Delete failed");
            return;
          }

          setSelectedPolicyId("");
          setRunResult(null);
          setForm({ ...defaultForm });
          setStatusText("Policy deleted");
          await bootstrap();
          await fetchIssues();
          await fetchCorrections();
          await fetchAudits();
        }

        async function resetPlatform() {
          const confirmed = window.confirm("Reset all policies, audits, and rule overrides?");
          if (!confirmed) {
            return;
          }

          const response = await fetch("/api/platform/reset", {
            method: "POST"
          });

          if (!response.ok) {
            setStatusText("Reset failed");
            return;
          }

          setSelectedPolicyId("");
          setRunResult(null);
          setBatchRunSummary(null);
          setForm({ ...defaultForm });
          setValidationFilters({
            severity: "",
            status: "",
            correctionMode: "",
            autoFixable: "",
            minConfidence: "",
            maxConfidence: "",
            ruleId: "",
            policyId: "",
            search: ""
          });

          setPolicyFilters({
            lifecycleStatus: "",
            policyState: "",
            lineOfBusiness: "",
            producerCode: "",
            jurisdiction: "",
            hasCustomer: "",
            effectiveFrom: "",
            effectiveTo: ""
          });

          setIntegrationFilters({
            search: "",
            policyId: "",
            targetSystem: "",
            status: ""
          });

          setCorrectionFilters({
            search: "",
            policyId: "",
            severity: "",
            ruleId: ""
          });

          setAuditFilters({
            search: "",
            policyId: "",
            module: "",
            fromDate: "",
            toDate: ""
          });

          await bootstrap();
          await fetchIssues({
            severity: "",
            status: "",
            correctionMode: "",
            autoFixable: "",
            minConfidence: "",
            maxConfidence: "",
            ruleId: "",
            policyId: "",
            search: ""
          });
          await fetchCorrections();
          await fetchAudits();
          setStatusText("Platform reset complete");
        }

        function exportSelectedSnapshot() {
          if (!selectedPolicyId) {
            setStatusText("Select a policy first");
            return;
          }

          const selectedPolicy = policies.find((p) => p.policyId === selectedPolicyId);
          const payload = {
            exportedAt: new Date().toISOString(),
            selectedPolicy,
            runResult,
            issues: issues.filter((item) => item.policyId === selectedPolicyId),
            corrections: corrections.filter((item) => item.policyId === selectedPolicyId),
            audits: auditEvents.filter((item) => item.policyId === selectedPolicyId)
          };

          const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const anchor = document.createElement("a");
          anchor.href = url;
          anchor.download = `${selectedPolicyId}-snapshot.json`;
          anchor.click();
          URL.revokeObjectURL(url);
          setStatusText(`Snapshot exported: ${selectedPolicyId}`);
        }

        function exportAuditLog() {
          const exportEvents = filteredAuditEvents;
          const exportPolicyId = auditFilters.policyId || selectedPolicyId;

          const payload = {
            exportedAt: new Date().toISOString(),
            selectedPolicyId: exportPolicyId,
            count: exportEvents.length,
            events: exportEvents
          };

          const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const anchor = document.createElement("a");
          anchor.href = url;
          anchor.download = exportPolicyId ? `${exportPolicyId}-audit.json` : "platform-audit.json";
          anchor.click();
          URL.revokeObjectURL(url);
          setStatusText("Audit timeline exported");
        }

        async function runPolicy(policyId = selectedPolicyId) {
          if (!policyId) {
            setStatusText("Create or select a policy first");
            return;
          }
          setRunning(true);
          setWorkflowLogs([]);
          setStatusText("Running platform workflow...");

          try {
            const steps = [
              "Running validation layer checks",
              "Applying correction governance",
              "Performing single re-validation",
              "Calculating weighted score",
              "Writing audit timeline"
            ];

            for (let i = 0; i < steps.length; i += 1) {
              setWorkflowStep(i);
              setWorkflowLogs((prev) => [...prev, steps[i]]);
              await wait(220);
            }

            const response = await fetch(`/api/platform/policies/${policyId}/run`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                actor: form.actor || "ui.user",
                profile: governance.mode
              })
            });

            if (!response.ok) {
              throw new Error("Run failed");
            }

            const data = await response.json();
            setRunResult(data);
            setLastRunAt(new Date().toISOString());
            setStatusText(`Run complete for ${policyId}`);
            setWorkflowLogs((prev) => [...prev, ...data.logs.map((l) => `${l.step}: ${l.message}`)]);
            await bootstrap();
            await fetchIssues();
            await fetchCorrections();
            await fetchAudits(policyId);
            return data;
          } catch (error) {
            setStatusText("Simulation failed");
            return null;
          } finally {
            setRunning(false);
            setWorkflowStep(-1);
          }
        }

        async function runDemoMode() {
          if (demoModeRunning || running) {
            return;
          }

          setDemoModeRunning(true);
          setStatusText("Demo mode running...");
          setRuleImpactMessage("");

          try {
            const selected = demoCases.find((item) => item.name === selectedDemoCase);
            const fallback = demoCases[0];
            const chosenCase = selected || fallback;
            const demoPayload = {
              ...defaultForm,
              ...(chosenCase ? chosenCase.payload : {}),
              policyAddress: chosenCase?.payload?.policyAddress || "",
              actor: "demo.mode"
            };

            setActiveModule("workbench");
            setForm(demoPayload);
            await wait(350);

            const created = await createPolicyWithPayload(demoPayload);
            setSelectedPolicyId(created.policyId);
            await bootstrap();
            await wait(350);

            await runPolicy(created.policyId);

            const tour = ["dashboard", "validation", "corrections", "audit", "rules"];
            for (const page of tour) {
              setActiveModule(page);
              await wait(850);
            }

            setStatusText("Demo mode complete");
          } catch (e) {
            setStatusText("Demo mode failed");
          } finally {
            setDemoModeRunning(false);
          }
        }

        async function updateRule(ruleId, patch) {
          const selectedPolicy = policies.find((p) => p.policyId === selectedPolicyId);
          const previousScore = selectedPolicy ? selectedPolicy.scoreAfter : null;

          await fetch(`/api/platform/rules/${ruleId}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(patch)
          });
          await bootstrap();
          await fetchAudits();
          setStatusText(`Rule updated: ${ruleId}`);
          if (autoRerunRules && selectedPolicyId) {
            const rerun = await runPolicy(selectedPolicyId);
            if (rerun && previousScore != null) {
              const delta = rerun.scoreAfter - previousScore;
              const sign = delta >= 0 ? "+" : "";
              setRuleImpactMessage(`Rule updated: score changed by ${sign}${delta}`);
            }
          }
        }

        async function resetRulesToDefault() {
          const confirmed = window.confirm("Reset all rule settings to catalog defaults?");
          if (!confirmed) {
            return;
          }

          const response = await fetch("/api/platform/rules/reset", {
            method: "POST"
          });

          if (!response.ok) {
            setStatusText("Failed to reset rules");
            return;
          }

          await bootstrap();
          await fetchAudits();
          setStatusText("Rule settings restored to default values");

          if (autoRerunRules && selectedPolicyId) {
            await runPolicy(selectedPolicyId);
          }
        }

        async function actOnSuggestion(policyId, issueKey, action, options = {}) {
          const { skipRefresh = false, silent = false } = options;
          const policyForHints = policies.find((item) => item.policyId === policyId);
          const payload = action === "resolve"
            ? {
              action,
              customerName: policyForHints?.input?.customerName || form.customerName,
              customerAddress: policyForHints?.input?.customerAddress || form.customerAddress
            }
            : { action };

          const response = await fetch(`/api/platform/policies/${policyId}/issues/${issueKey}/action`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            const error = await response.json().catch(() => ({}));
            if (!silent) {
              setStatusText(error.message || `Issue action failed: ${action}`);
            }
            return false;
          }

          if (!skipRefresh) {
            await fetchIssues();
            await bootstrap();
            await fetchAudits(policyId);
          }

          const messageByAction = {
            approve: "Suggestion approved",
            reject: "Suggestion rejected",
            resolve: "Manual issue resolved"
          };
          if (!silent) {
            setStatusText(messageByAction[action] || `Issue updated: ${action}`);
          }
          return true;
        }

        async function runBulkIssueAction(items, action, successLabel) {
          if (items.length === 0) {
            setStatusText(`No records available for bulk ${action}`);
            return;
          }

          setRunning(true);
          let successCount = 0;
          const touchedPolicies = new Set();

          try {
            for (const item of items) {
              const ok = await actOnSuggestion(item.policyId, item.issueKey, action, {
                skipRefresh: true,
                silent: true
              });
              if (ok) {
                successCount += 1;
                touchedPolicies.add(item.policyId);
              }
            }

            await fetchIssues();
            await bootstrap();

            const auditTargetPolicyId = touchedPolicies.size === 1
              ? Array.from(touchedPolicies)[0]
              : "";
            await fetchAudits(auditTargetPolicyId);
            setStatusText(`${successLabel}: ${successCount}/${items.length}`);
          } finally {
            setRunning(false);
          }
        }

        function selectPolicy(policy) {
          setSelectedPolicyId(policy.policyId);
          setForm(normalizePolicyInput(policy.input));
          setStatusText(`Selected ${policy.policyId}`);
        }

        function clearValidationFilters() {
          const cleared = {
            severity: "",
            status: "",
            correctionMode: "",
            autoFixable: "",
            minConfidence: "",
            maxConfidence: "",
            ruleId: "",
            policyId: "",
            search: ""
          };

          setValidationFilters(cleared);
          fetchIssues(cleared);
        }

        function clearPolicyFilters() {
          setPolicyFilters({
            lifecycleStatus: "",
            policyState: "",
            lineOfBusiness: "",
            producerCode: "",
            jurisdiction: "",
            hasCustomer: "",
            effectiveFrom: "",
            effectiveTo: ""
          });
        }

        function clearIntegrationFilters() {
          setIntegrationFilters({
            search: "",
            policyId: "",
            targetSystem: "",
            status: ""
          });
        }

        function clearCorrectionFilters() {
          setCorrectionFilters({
            search: "",
            policyId: "",
            severity: "",
            ruleId: ""
          });
        }

        function clearAuditFilters() {
          setAuditFilters({
            search: "",
            policyId: "",
            module: "",
            fromDate: "",
            toDate: ""
          });
        }

        const dashboard = useMemo(() => {
          const total = policies.length;
          const avgScore = total ? Math.round(policies.reduce((sum, p) => sum + (p.scoreAfter || 0), 0) / total) : 0;
          const validated = policies.filter((p) => p.status === "VALIDATED").length;
          const corrected = policies.filter((p) => p.status === "CORRECTED").length;
          const blocked = policies.filter((p) => p.status === "BLOCKED").length;
          const criticalIssues = issues.filter((i) => i.severity === "Critical").length;
          const autoFixableCount = issues.filter((i) => i.autoFixable).length;
          const autoFixedCount = issues.filter((i) => i.autoFixable && i.status === "Resolved").length;
          const autoFixRate = autoFixableCount > 0 ? Math.round((autoFixedCount / autoFixableCount) * 100) : 0;
          const threshold = Number(governance.autoApplyMinConfidence || 0);
          const confidenceTrackedIssues = issues.filter(
            (item) => item.autoFixable && Number.isFinite(Number(item.correctionConfidence))
          );
          const confidencePercent = (value) => Math.round(Number(value || 0) * 100);
          const avgConfidence = confidenceTrackedIssues.length > 0
            ? Math.round(
              confidenceTrackedIssues.reduce((sum, item) => sum + Number(item.correctionConfidence || 0), 0)
              / confidenceTrackedIssues.length
              * 100
            )
            : 0;
          const suggestedConfidence = confidenceTrackedIssues.filter((item) => item.status === "Suggested");
          const resolvedConfidence = confidenceTrackedIssues.filter((item) => item.status === "Resolved");
          const avgSuggestedConfidence = suggestedConfidence.length > 0
            ? Math.round(
              suggestedConfidence.reduce((sum, item) => sum + Number(item.correctionConfidence || 0), 0)
              / suggestedConfidence.length
              * 100
            )
            : 0;
          const avgResolvedConfidence = resolvedConfidence.length > 0
            ? Math.round(
              resolvedConfidence.reduce((sum, item) => sum + Number(item.correctionConfidence || 0), 0)
              / resolvedConfidence.length
              * 100
            )
            : 0;
          const thresholdPassedCount = confidenceTrackedIssues.filter(
            (item) => Number(item.correctionConfidence || 0) >= threshold
          ).length;
          const thresholdQueuedCount = confidenceTrackedIssues.filter(
            (item) => Number(item.correctionConfidence || 0) < threshold
          ).length;
          const issueFreq = {};
          const severityBuckets = { Critical: 0, High: 0, Medium: 0, Low: 0 };
          issues.forEach((i) => {
            if (severityBuckets[i.severity] != null) {
              severityBuckets[i.severity] += 1;
            }
            issueFreq[i.ruleId] = (issueFreq[i.ruleId] || 0) + 1;
          });

          const topIssue = Object.keys(issueFreq).length
            ? Object.entries(issueFreq).sort((a, b) => b[1] - a[1])[0][0]
            : "No issues yet";

          const currentCritical = issues.filter((i) => i.severity === "Critical" && i.status !== "Resolved").length;
          const criticalReduction = criticalIssues > 0
            ? Math.max(0, Math.round(((criticalIssues - currentCritical) / criticalIssues) * 100))
            : 0;

          const roi = roiSummary?.roi || {};
          const roiTotals = roiSummary?.totals || {};

          return {
            total,
            avgScore,
            criticalIssues,
            autoFixRate,
            validated,
            corrected,
            blocked,
            severityBuckets,
            topIssue,
            criticalReduction,
            netWeeklyHours: roi.netWeeklyHours || 0,
            riskCostAvoided: roi.riskCostAvoided || 0,
            issueReductionPercent: roi.issueReductionPercent || 0,
            autoCorrections: roiTotals.autoCorrections || 0,
            autoFixConfidenceThreshold: confidencePercent(threshold),
            avgConfidence,
            avgSuggestedConfidence,
            avgResolvedConfidence,
            thresholdPassedCount,
            thresholdQueuedCount
          };
        }, [policies, issues, roiSummary, governance]);

        const activeModuleDef = useMemo(
          () => modules.find((item) => item.key === activeModule) || modules[0],
          [activeModule]
        );

        const selectedPolicy = useMemo(
          () => policies.find((policy) => policy.policyId === selectedPolicyId) || null,
          [policies, selectedPolicyId]
        );

        const selectedPolicyIssueCount = useMemo(
          () => issues.filter((issue) => issue.policyId === selectedPolicyId).length,
          [issues, selectedPolicyId]
        );

        const selectedPolicySuggestionCount = useMemo(
          () => issues.filter((issue) => issue.policyId === selectedPolicyId && issue.status === "Suggested").length,
          [issues, selectedPolicyId]
        );

        const lineOfBusinessOptions = useMemo(() => {
          const options = new Set(["PersonalAuto", "CommercialAuto", "Homeowners", "WorkersComp", "GeneralLiability"]);
          policies.forEach((policy) => {
            if (policy.input?.lineOfBusiness) {
              options.add(policy.input.lineOfBusiness);
            }
          });
          return Array.from(options);
        }, [policies]);

        const latestCorrectionExamples = useMemo(() => {
          if (!runResult || !Array.isArray(runResult.corrections) || runResult.corrections.length === 0) {
            return [];
          }

          const issueByKey = new Map((runResult.issues || []).map((issue) => [issue.issueKey, issue]));

          return runResult.corrections.slice(0, 5).map((correction) => {
            const issue = issueByKey.get(correction.issueId);
            const confidenceRaw = issue ? Number(issue.correctionConfidence) : NaN;
            const confidence = Number.isFinite(confidenceRaw) ? Math.round(confidenceRaw * 100) : null;

            return {
              ...correction,
              confidence
            };
          });
        }, [runResult]);

        const visiblePolicies = useMemo(() => {
          const query = policySearch.trim().toLowerCase();
          let items = [...policies];

          if (query) {
            items = items.filter((policy) => {
              const customerName = String(policy.input?.customerName || "").toLowerCase();
              return (
                String(policy.policyId || "").toLowerCase().includes(query) ||
                String(policy.status || "").toLowerCase().includes(query) ||
                String(policy.input?.accountNumber || "").toLowerCase().includes(query) ||
                String(policy.input?.producerCode || "").toLowerCase().includes(query) ||
                customerName.includes(query)
              );
            });
          }

          if (policyFilters.lifecycleStatus) {
            items = items.filter((policy) => policy.status === policyFilters.lifecycleStatus);
          }

          if (policyFilters.policyState) {
            items = items.filter((policy) => String(policy.input?.status || "") === policyFilters.policyState);
          }

          if (policyFilters.lineOfBusiness) {
            items = items.filter((policy) => String(policy.input?.lineOfBusiness || "") === policyFilters.lineOfBusiness);
          }

          if (policyFilters.producerCode) {
            const producerNeedle = policyFilters.producerCode.toLowerCase();
            items = items.filter((policy) =>
              String(policy.input?.producerCode || "").toLowerCase().includes(producerNeedle)
            );
          }

          if (policyFilters.jurisdiction) {
            const jurisdictionNeedle = policyFilters.jurisdiction.toLowerCase();
            items = items.filter((policy) =>
              String(policy.input?.jurisdiction || "").toLowerCase().includes(jurisdictionNeedle)
            );
          }

          if (policyFilters.hasCustomer === "yes") {
            items = items.filter((policy) => Boolean(policy.input?.hasCustomer));
          }

          if (policyFilters.hasCustomer === "no") {
            items = items.filter((policy) => !policy.input?.hasCustomer);
          }

          if (policyFilters.effectiveFrom) {
            items = items.filter((policy) => {
              const effectiveDate = String(policy.input?.effectiveDate || "");
              return effectiveDate && effectiveDate >= policyFilters.effectiveFrom;
            });
          }

          if (policyFilters.effectiveTo) {
            items = items.filter((policy) => {
              const effectiveDate = String(policy.input?.effectiveDate || "");
              return effectiveDate && effectiveDate <= policyFilters.effectiveTo;
            });
          }

          const byDate = (left, right, field) => {
            const leftValue = left[field] ? new Date(left[field]).getTime() : 0;
            const rightValue = right[field] ? new Date(right[field]).getTime() : 0;
            return rightValue - leftValue;
          };

          switch (policySort) {
            case "score_desc":
              items.sort((a, b) => (b.scoreAfter || 0) - (a.scoreAfter || 0));
              break;
            case "score_asc":
              items.sort((a, b) => (a.scoreAfter || 0) - (b.scoreAfter || 0));
              break;
            case "status":
              items.sort((a, b) => String(a.status || "").localeCompare(String(b.status || "")));
              break;
            case "created_desc":
              items.sort((a, b) => byDate(a, b, "createdAt"));
              break;
            case "updated_desc":
            default:
              items.sort((a, b) => byDate(a, b, "updatedAt"));
              break;
          }

          return items;
        }, [policies, policySearch, policySort, policyFilters]);

        const integrationTargetOptions = useMemo(() => {
          const targets = new Set(integrationTargets);
          integrationEventLog.forEach((event) => {
            if (event?.targetSystem) {
              targets.add(event.targetSystem);
            }
          });
          return Array.from(targets);
        }, [integrationEventLog]);

        const integrationStatusOptions = useMemo(() => {
          const statuses = new Set(["Published"]);
          integrationEventLog.forEach((event) => {
            if (event?.status) {
              statuses.add(event.status);
            }
          });
          return Array.from(statuses);
        }, [integrationEventLog]);

        const filteredIntegrationEvents = useMemo(() => {
          const search = String(integrationFilters.search || "").trim().toLowerCase();
          return integrationEventLog.filter((event) => {
            if (integrationFilters.policyId && event.policyId !== integrationFilters.policyId) {
              return false;
            }
            if (integrationFilters.targetSystem && event.targetSystem !== integrationFilters.targetSystem) {
              return false;
            }
            if (integrationFilters.status && event.status !== integrationFilters.status) {
              return false;
            }
            if (!search) {
              return true;
            }
            return (
              String(event.integrationEventId || "").toLowerCase().includes(search) ||
              String(event.policyId || "").toLowerCase().includes(search) ||
              String(event.targetSystem || "").toLowerCase().includes(search)
            );
          }).slice(0, 50);
        }, [integrationEventLog, integrationFilters]);

        const filteredCorrections = useMemo(() => {
          const search = String(correctionFilters.search || "").trim().toLowerCase();
          return corrections.filter((correction) => {
            if (correctionFilters.policyId && correction.policyId !== correctionFilters.policyId) {
              return false;
            }
            if (correctionFilters.ruleId && correction.ruleId !== correctionFilters.ruleId) {
              return false;
            }
            if (correctionFilters.severity) {
              const issue = issues.find((item) =>
                item.policyId === correction.policyId && item.ruleId === correction.ruleId
              );
              if (issue && issue.severity !== correctionFilters.severity) {
                return false;
              }
            }
            if (!search) {
              return true;
            }
            return (
              String(correction.policyId || "").toLowerCase().includes(search) ||
              String(correction.correctionType || "").toLowerCase().includes(search) ||
              String(correction.actionTaken || "").toLowerCase().includes(search)
            );
          });
        }, [corrections, correctionFilters, issues]);

        const auditModuleOptions = useMemo(() => {
          const modules = new Set();
          auditEvents.forEach((event) => {
            if (event?.module) {
              modules.add(event.module);
            }
          });
          return Array.from(modules).sort();
        }, [auditEvents]);

        const filteredAuditEvents = useMemo(() => {
          const search = String(auditFilters.search || "").trim().toLowerCase();
          const fromBoundary = auditFilters.fromDate ? new Date(`${auditFilters.fromDate}T00:00:00`).getTime() : null;
          const toBoundary = auditFilters.toDate ? new Date(`${auditFilters.toDate}T23:59:59`).getTime() : null;

          return auditEvents.filter((event) => {
            if (auditFilters.policyId && event.policyId !== auditFilters.policyId) {
              return false;
            }
            if (auditFilters.module && event.module !== auditFilters.module) {
              return false;
            }

            if (fromBoundary != null || toBoundary != null) {
              const eventTime = new Date(event.timestamp).getTime();
              if (fromBoundary != null && eventTime < fromBoundary) {
                return false;
              }
              if (toBoundary != null && eventTime > toBoundary) {
                return false;
              }
            }

            if (!search) {
              return true;
            }

            return (
              String(event.eventId || "").toLowerCase().includes(search) ||
              String(event.policyId || "").toLowerCase().includes(search) ||
              String(event.module || "").toLowerCase().includes(search) ||
              String(event.message || "").toLowerCase().includes(search)
            );
          });
        }, [auditEvents, auditFilters]);

        const workflowNames = ["Detect", "Classify", "Correct", "Re-validate", "Score", "Audit"];

        const renderDashboard = () => (
          <div className="module-grid">
            <div className="kpi-row">
              <div className="kpi"><span>Total Policies</span><strong>{dashboard.total}</strong></div>
              <div className="kpi"><span>Avg Integrity Score</span><strong>{dashboard.avgScore}</strong></div>
              <div className="kpi"><span>Critical Issues</span><strong>{dashboard.criticalIssues}</strong></div>
              <div className="kpi"><span>Auto Fix Rate</span><strong>{dashboard.autoFixRate}%</strong></div>
            </div>
            <div className="kpi-row compact">
              <div className="kpi"><span>Net Weekly Hours Saved</span><strong>{dashboard.netWeeklyHours}</strong></div>
              <div className="kpi"><span>Risk Cost Avoided</span><strong>${dashboard.riskCostAvoided}</strong></div>
              <div className="kpi"><span>Issue Reduction</span><strong>{dashboard.issueReductionPercent}%</strong></div>
            </div>
            <section className="panel insights-panel">
              <h3>Insights</h3>
              <ul>
                <li>Most frequent issue: {dashboard.topIssue}</li>
                <li>Auto-fix success rate: {dashboard.autoFixRate}%</li>
                <li>Critical issues reduced by: {dashboard.criticalReduction}%</li>
                <li>Automated corrections completed: {dashboard.autoCorrections}</li>
              </ul>
            </section>
            <section className="panel confidence-panel">
              <h3>Confidence Transparency</h3>
              <div className="kpi-row compact">
                <div className="kpi"><span>Threshold</span><strong>{dashboard.autoFixConfidenceThreshold}%</strong></div>
                <div className="kpi"><span>Avg Auto-Fix Confidence</span><strong>{dashboard.avgConfidence}%</strong></div>
                <div className="kpi"><span>Avg Suggested Confidence</span><strong>{dashboard.avgSuggestedConfidence}%</strong></div>
              </div>
              <div className="small-note">Resolved confidence: {dashboard.avgResolvedConfidence}% | Above threshold: {dashboard.thresholdPassedCount} | Below threshold: {dashboard.thresholdQueuedCount}</div>
            </section>
            <section className="panel strategic-panel">
              <h3>Strategic Value Positioning</h3>
              <div className="small-note">Guidewire Policy Integrity Engine (PIE) delivers proactive risk and compliance insurance for policy operations.</div>
              <ul>
                <li>Stops defects early, before downstream billing and claims leakage.</li>
                <li>Supports phased adoption from validation-only to full automation.</li>
                <li>Maintains transparent audit evidence for regulators and internal control teams.</li>
              </ul>
            </section>
            {batchRunSummary && (
              <section className="panel batch-summary">
                <h3>Latest Batch Run</h3>
                <div className="kpi-row compact">
                  <div className="kpi"><span>Validated</span><strong>{batchRunSummary.validated}</strong></div>
                  <div className="kpi"><span>Corrected</span><strong>{batchRunSummary.corrected}</strong></div>
                  <div className="kpi"><span>Blocked</span><strong>{batchRunSummary.blocked}</strong></div>
                </div>
              </section>
            )}
            <div className="before-after-panel">
              <div className="panel stat-panel">
                <h3>Before vs After (Latest Run)</h3>
                {runResult ? (
                  <>
                    <div className="score-compare">
                      <div>
                        <div className="small-note">Before</div>
                        <div className="score-big">{runResult.scoreBefore}</div>
                      </div>
                      <div className="arrow">→</div>
                      <div>
                        <div className="small-note">After</div>
                        <div className="score-big">{runResult.scoreAfter}</div>
                      </div>
                      <div>
                        <div className="small-note">Delta</div>
                        <div className="score-delta">{runResult.scoreAfter - runResult.scoreBefore >= 0 ? `+${runResult.scoreAfter - runResult.scoreBefore}` : runResult.scoreAfter - runResult.scoreBefore}</div>
                      </div>
                    </div>
                    <div className="small-note">Policy: {runResult.policy?.policyId || selectedPolicyId || "-"}</div>
                  </>
                ) : (
                  <div className="small-note">Run a policy from Workbench to show before/after proof.</div>
                )}
              </div>
            </div>
            <section className="panel correction-proof-panel">
              <h3>Automated Correction Examples (Before/After)</h3>
              {latestCorrectionExamples.length > 0 ? (
                <div className="table-wrap">
                  <table>
                    <thead><tr><th>Correction</th><th>Old Value</th><th>New Value</th><th>Confidence</th></tr></thead>
                    <tbody>
                      {latestCorrectionExamples.map((item, idx) => (
                        <tr key={`${item.ruleId}-${item.issueId}-${idx}`}>
                          <td>{item.correctionType}</td>
                          <td>{item.oldValue}</td>
                          <td>{item.newValue}</td>
                          <td>{item.confidence != null ? `${item.confidence}%` : "-"}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              ) : (
                <div className="small-note">Run a policy with auto-fixable issues to populate correction evidence.</div>
              )}
            </section>
            <div className="chart-grid">
              <ChartPanel chartId="severityPie" type="pie" title="Severity Distribution" labels={["Critical", "High", "Medium", "Low"]} values={[
                dashboard.severityBuckets.Critical,
                dashboard.severityBuckets.High,
                dashboard.severityBuckets.Medium,
                dashboard.severityBuckets.Low
              ]} />
              <ChartPanel chartId="statusBars" type="bar" title="Policy Status" labels={["VALIDATED", "CORRECTED", "BLOCKED"]} values={[
                dashboard.validated,
                dashboard.corrected,
                dashboard.blocked
              ]} />
              <ChartPanel chartId="scoreTrend" type="line" title="Score Trend" labels={policies.slice(0, 8).map((p) => p.policyId)} values={policies.slice(0, 8).map((p) => p.scoreAfter || 0)} />
              <ChartPanel chartId="issuesTrend" type="line" title="Issues Trend" labels={policies.slice(0, 8).map((p) => p.policyId)} values={policies.slice(0, 8).map((p) => p.issueCount || 0)} />
            </div>
          </div>
        );

        const renderWorkbench = () => (
          <div className="module-grid two-col">
            <section className="panel">
              <h2>Policy Creation</h2>
              <div className="scenario-strip">
                <select value={selectedDemoCase} onChange={(e) => setSelectedDemoCase(e.target.value)}>
                  {demoCases.length === 0 && <option value="">No demo cases loaded</option>}
                  {demoCases.map((demoCase) => (
                    <option key={demoCase.name} value={demoCase.name}>{demoCase.name}</option>
                  ))}
                </select>
                <button className="btn-secondary" onClick={loadDemoCase}>Load Demo Case</button>
                <button className="btn-secondary" onClick={seedDemoPack} disabled={running || demoModeRunning || demoCases.length === 0}>Seed Demo Pack</button>
                <button className="btn-ghost" onClick={runDemoMode} disabled={demoModeRunning || running}>
                  {demoModeRunning ? "Demo Running..." : "Guided Demo"}
                </button>
              </div>
              <div className="form-grid">
                <div className="field"><label>Account Number</label><input value={form.accountNumber} onChange={(e) => setField("accountNumber", e.target.value)} /></div>
                <div className="field"><label>Line of Business</label><select value={form.lineOfBusiness} onChange={(e) => setField("lineOfBusiness", e.target.value)}><option>PersonalAuto</option><option>CommercialAuto</option><option>Homeowners</option><option>WorkersComp</option><option>GeneralLiability</option></select></div>
                <div className="field"><label>Product Code</label><input value={form.productCode} onChange={(e) => setField("productCode", e.target.value)} /></div>
                <div className="field"><label>Offering</label><select value={form.offering} onChange={(e) => setField("offering", e.target.value)}><option>Standard</option><option>Preferred</option><option>Premier</option></select></div>
                <div className="field"><label>Effective Date</label><input type="date" value={form.effectiveDate} onChange={(e) => setField("effectiveDate", e.target.value)} /></div>
                <div className="field"><label>Expiration Date</label><input type="date" value={form.expirationDate} onChange={(e) => setField("expirationDate", e.target.value)} /></div>
                <div className="field"><label>Term Type</label><select value={form.termType} onChange={(e) => setField("termType", e.target.value)}><option>Annual</option><option>SemiAnnual</option><option>Quarterly</option></select></div>
                <div className="field"><label>Jurisdiction</label><input value={form.jurisdiction} onChange={(e) => setField("jurisdiction", e.target.value.toUpperCase())} placeholder="CA" /></div>
                <div className="field"><label>Producer Code</label><input value={form.producerCode} onChange={(e) => setField("producerCode", e.target.value)} /></div>
                <div className="field"><label>Underwriter</label><input value={form.underwriter} onChange={(e) => setField("underwriter", e.target.value)} /></div>
                <div className="field"><label>Submission Channel</label><select value={form.submissionChannel} onChange={(e) => setField("submissionChannel", e.target.value)}><option>Portal</option><option>BrokerUpload</option><option>API</option><option>Manual</option></select></div>
                <div className="field"><label>Billing Plan</label><select value={form.billingPlan} onChange={(e) => setField("billingPlan", e.target.value)}><option>Monthly</option><option>Quarterly</option><option>SemiAnnual</option><option>Annual</option></select></div>
                <div className="field"><label>Currency</label><select value={form.currency} onChange={(e) => setField("currency", e.target.value)}><option>USD</option><option>EUR</option><option>GBP</option><option>INR</option></select></div>
                <div className="field"><label>Actor</label><input value={form.actor} onChange={(e) => setField("actor", e.target.value)} /></div>
                <div className="field"><label>Premium</label><input type="number" value={form.premium} onChange={(e) => setField("premium", Number(e.target.value))} /></div>
                <div className="field"><label>Coverage</label><input type="number" value={form.coverage} onChange={(e) => setField("coverage", Number(e.target.value))} /></div>
                <div className="field"><label>Status</label><select value={form.status} onChange={(e) => setField("status", e.target.value)}><option>Active</option><option>Cancelled</option></select></div>
                <div className="field"><label>Has Customer</label><input type="checkbox" checked={form.hasCustomer} onChange={(e) => setField("hasCustomer", e.target.checked)} /></div>
                <div className="field"><label>Customer Name</label><input value={form.customerName} onChange={(e) => setField("customerName", e.target.value)} disabled={!form.hasCustomer} /></div>
                <div className="field"><label>Customer Address</label><input value={form.customerAddress} onChange={(e) => setField("customerAddress", e.target.value)} disabled={!form.hasCustomer} /></div>
                <div className="field"><label>Policy Address</label><input value={form.policyAddress} onChange={(e) => setField("policyAddress", e.target.value)} /></div>
                <div className="field"><label>Duplicate Candidate</label><input type="checkbox" checked={form.duplicateCustomerCandidate} onChange={(e) => setField("duplicateCustomerCandidate", e.target.checked)} /></div>
                <div className="field"><label>Billing Active</label><input type="checkbox" checked={form.billingActive} onChange={(e) => setField("billingActive", e.target.checked)} /></div>
                <div className="field"><label>Configuration Valid</label><input type="checkbox" checked={form.configValid} onChange={(e) => setField("configValid", e.target.checked)} /></div>
              </div>
              <div className="small-note">Guidewire-style metadata captured here: account, LOB/product, term dates, jurisdiction, producer, underwriter, channel, and billing plan.</div>
              <div className="actions">
                <button className="btn-primary" onClick={createPolicy}>Create Policy</button>
                <button className="btn-secondary" onClick={updatePolicy}>Update Selected</button>
                <button className="btn-ghost" onClick={() => runPolicy() } disabled={running}>{running ? "Running..." : "Validate Policy"}</button>
                <button className="btn-ghost" onClick={runAllPolicies} disabled={running || policies.length === 0}>Run All Policies</button>
                <button className="btn-secondary" onClick={exportSelectedSnapshot} disabled={!selectedPolicyId}>Export Snapshot</button>
                <button className="mini danger" onClick={deleteSelectedPolicy} disabled={!selectedPolicyId}>Delete Selected</button>
                <button className="mini danger" onClick={resetPlatform}>Reset Platform</button>
              </div>

              <div className="workflow-strip">
                {workflowNames.map((step, idx) => (
                  <div key={step} className={`flow-step ${workflowStep >= idx ? "active" : ""}`}>{step}</div>
                ))}
              </div>
              <div className="log-box">
                {workflowLogs.length === 0 && <div className="small-note">Workflow logs appear here during execution.</div>}
                {workflowLogs.map((log, idx) => <div key={idx}>[{idx + 1}] {log}</div>)}
              </div>
              <div className="small-note">
                Current creation context: Account {form.accountNumber || "-"} | LOB {form.lineOfBusiness || "-"} | Product {form.productCode || "-"} | Effective {form.effectiveDate || "-"} | Producer {form.producerCode || "-"}
              </div>
            </section>

            <section className="panel">
              <h2>Policies</h2>
              <div className="toolbar-row">
                <input
                  placeholder="Search policy id, account, status, customer, producer"
                  value={policySearch}
                  onChange={(e) => setPolicySearch(e.target.value)}
                />
                <select value={policySort} onChange={(e) => setPolicySort(e.target.value)}>
                  <option value="updated_desc">Sort: Recently Updated</option>
                  <option value="created_desc">Sort: Recently Created</option>
                  <option value="score_desc">Sort: Score High to Low</option>
                  <option value="score_asc">Sort: Score Low to High</option>
                  <option value="status">Sort: Status</option>
                </select>
                <div className="small-note">Showing {visiblePolicies.length} of {policies.length}</div>
              </div>
              <div className="policy-filters-row">
                <select value={policyFilters.lifecycleStatus} onChange={(e) => setPolicyFilters((prev) => ({ ...prev, lifecycleStatus: e.target.value }))}>
                  <option value="">Lifecycle: All</option>
                  <option value="NEW">NEW</option>
                  <option value="VALIDATED">VALIDATED</option>
                  <option value="CORRECTED">CORRECTED</option>
                  <option value="BLOCKED">BLOCKED</option>
                </select>
                <select value={policyFilters.policyState} onChange={(e) => setPolicyFilters((prev) => ({ ...prev, policyState: e.target.value }))}>
                  <option value="">Policy State: All</option>
                  <option value="Active">Active</option>
                  <option value="Cancelled">Cancelled</option>
                </select>
                <select value={policyFilters.lineOfBusiness} onChange={(e) => setPolicyFilters((prev) => ({ ...prev, lineOfBusiness: e.target.value }))}>
                  <option value="">LOB: All</option>
                  {lineOfBusinessOptions.map((option) => <option key={option} value={option}>{option}</option>)}
                </select>
                <select value={policyFilters.hasCustomer} onChange={(e) => setPolicyFilters((prev) => ({ ...prev, hasCustomer: e.target.value }))}>
                  <option value="">Customer Link: All</option>
                  <option value="yes">Has Customer</option>
                  <option value="no">Missing Customer</option>
                </select>
                <input
                  placeholder="Producer code"
                  value={policyFilters.producerCode}
                  onChange={(e) => setPolicyFilters((prev) => ({ ...prev, producerCode: e.target.value }))}
                />
                <input
                  placeholder="Jurisdiction"
                  value={policyFilters.jurisdiction}
                  onChange={(e) => setPolicyFilters((prev) => ({ ...prev, jurisdiction: e.target.value }))}
                />
                <input
                  type="date"
                  value={policyFilters.effectiveFrom}
                  onChange={(e) => setPolicyFilters((prev) => ({ ...prev, effectiveFrom: e.target.value }))}
                />
                <input
                  type="date"
                  value={policyFilters.effectiveTo}
                  onChange={(e) => setPolicyFilters((prev) => ({ ...prev, effectiveTo: e.target.value }))}
                />
                <button className="btn-secondary" onClick={clearPolicyFilters}>Clear Filters</button>
              </div>
              <div className="table-wrap">
                <table>
                  <thead><tr><th>ID</th><th>Account</th><th>LOB</th><th>Product</th><th>Policy State</th><th>Lifecycle</th><th>Score</th><th>Effective</th><th>Producer</th><th>Updated</th><th>Run</th><th>Status Flow</th><th>Action</th></tr></thead>
                  <tbody>
                    {visiblePolicies.map((p) => (
                      <tr key={p.policyId}>
                        <td>{p.policyId}</td>
                        <td>{p.input?.accountNumber || "-"}</td>
                        <td>{p.input?.lineOfBusiness || "-"}</td>
                        <td>{p.input?.productCode || "-"}</td>
                        <td>{p.input?.status || "-"}</td>
                        <td><StatusBadge value={p.status} /></td>
                        <td>{p.scoreAfter}</td>
                        <td>{p.input?.effectiveDate || "-"}</td>
                        <td>{p.input?.producerCode || "-"}</td>
                        <td>{p.updatedAt ? formatRelativeTime(p.updatedAt) : "-"}</td>
                        <td>{p.lastRunAt ? new Date(p.lastRunAt).toLocaleTimeString() : "-"}</td>
                        <td className="flow-mini">{(p.statusHistory || []).map((s) => s.status).join(" → ") || "NEW"}</td>
                        <td>
                          <button className="mini" onClick={() => selectPolicy(p)}>Select</button>
                          <button className="mini" onClick={() => runPolicy(p.policyId)}>Run</button>
                          <button className="mini danger" onClick={async () => {
                            const confirmed = window.confirm(`Delete ${p.policyId}?`);
                            if (!confirmed) {
                              return;
                            }
                            const response = await fetch(`/api/platform/policies/${p.policyId}`, { method: "DELETE" });
                            if (!response.ok) {
                              setStatusText(`Delete failed: ${p.policyId}`);
                              return;
                            }
                            if (selectedPolicyId === p.policyId) {
                              setSelectedPolicyId("");
                              setForm({ ...defaultForm });
                            }
                            setStatusText(`Deleted: ${p.policyId}`);
                            await bootstrap();
                            await fetchIssues();
                            await fetchCorrections();
                            await fetchAudits();
                          }}>Delete</button>
                        </td>
                      </tr>
                    ))}
                    {visiblePolicies.length === 0 && <tr><td colSpan="13">No policies match the current filters</td></tr>}
                  </tbody>
                </table>
              </div>
            </section>
          </div>
        );

        const renderAdoptionStudio = () => {
          const recentIntegrationEvents = filteredIntegrationEvents;
          const roi = roiSummary?.roi || {};
          const totals = roiSummary?.totals || {};

          return (
            <div className="module-grid adoption-grid">
              <section className="panel">
                <h2>1) Modular Rollout Profiles</h2>
                <div className="profile-cards">
                  <div className={`profile-card ${governance.mode === "validation-only" ? "active" : ""}`}>
                    <strong>Validation Only</strong>
                    <div className="small-note">Detect and classify issues with full audit trace, no automatic correction.</div>
                  </div>
                  <div className={`profile-card ${governance.mode === "human-in-loop" ? "active" : ""}`}>
                    <strong>Human-in-the-Loop</strong>
                    <div className="small-note">Generate suggestions and require reviewer approval before correction execution.</div>
                  </div>
                  <div className={`profile-card ${governance.mode === "full-automation" ? "active" : ""}`}>
                    <strong>Full Automation</strong>
                    <div className="small-note">Apply low-risk corrections automatically while preserving governance controls.</div>
                  </div>
                </div>

                <div className="form-grid adoption-form">
                  <div className="field">
                    <label>Execution Profile</label>
                    <select value={governance.mode} onChange={(e) => saveGovernance({ mode: e.target.value })}>
                      {governanceModes.map((mode) => (
                        <option key={mode.value} value={mode.value}>{mode.label}</option>
                      ))}
                    </select>
                  </div>
                  <div className="field">
                    <label>Auto-Apply Minimum Confidence ({Math.round((governance.autoApplyMinConfidence || 0) * 100)}%)</label>
                    <input
                      type="range"
                      min="0"
                      max="1"
                      step="0.05"
                      value={governance.autoApplyMinConfidence || 0}
                      onChange={(e) => saveGovernance({ autoApplyMinConfidence: Number(e.target.value) })}
                      disabled={governance.mode !== "full-automation"}
                    />
                  </div>
                </div>

                <div className="toggle-grid">
                  <label className="inline-check">
                    <input
                      type="checkbox"
                      checked={governance.emitIntegrationEvents !== false}
                      onChange={(e) => saveGovernance({ emitIntegrationEvents: e.target.checked })}
                    />
                    Emit integration events
                  </label>
                  <label className="inline-check">
                    <input
                      type="checkbox"
                      checked={governance.autoApplyCorrections !== false}
                      onChange={(e) => saveGovernance({ autoApplyCorrections: e.target.checked })}
                      disabled={governance.mode !== "full-automation"}
                    />
                    Auto-apply low-risk corrections
                  </label>
                </div>
                <div className="small-note">Current profile controls how run actions execute from Workbench, Run All, and direct validation APIs.</div>
              </section>

              <section className="panel">
                <h2>2) Human-in-the-Loop + 3) ROI Proof</h2>
                <div className="form-grid adoption-form">
                  <div className="field">
                    <label>Minutes Saved Per Auto Correction</label>
                    <input
                      type="number"
                      min="0"
                      value={roiAssumptions.minutesPerAutoCorrection}
                      onChange={(e) => setRoiAssumptions((prev) => ({ ...prev, minutesPerAutoCorrection: Number(e.target.value) }))}
                    />
                  </div>
                  <div className="field">
                    <label>Review Minutes Per Suggested Issue</label>
                    <input
                      type="number"
                      min="0"
                      value={roiAssumptions.reviewMinutesPerSuggestedIssue}
                      onChange={(e) => setRoiAssumptions((prev) => ({ ...prev, reviewMinutesPerSuggestedIssue: Number(e.target.value) }))}
                    />
                  </div>
                  <div className="field">
                    <label>Cost Avoided Per Blocked Case ($)</label>
                    <input
                      type="number"
                      min="0"
                      value={roiAssumptions.blockedCaseCostAvoided}
                      onChange={(e) => setRoiAssumptions((prev) => ({ ...prev, blockedCaseCostAvoided: Number(e.target.value) }))}
                    />
                  </div>
                </div>
                <div className="actions">
                  <button className="btn-primary" onClick={() => saveRoiAssumptions(roiAssumptions)}>Save ROI Assumptions</button>
                </div>

                <div className="kpi-row compact">
                  <div className="kpi"><span>Net Weekly Hours</span><strong>{roi.netWeeklyHours || 0}</strong></div>
                  <div className="kpi"><span>Issue Reduction</span><strong>{roi.issueReductionPercent || 0}%</strong></div>
                  <div className="kpi"><span>Risk Cost Avoided</span><strong>${roi.riskCostAvoided || 0}</strong></div>
                </div>
                <div className="small-note">Policies: {totals.policies || 0} | Issues: {totals.issues || 0} | Auto Corrections: {totals.autoCorrections || 0}</div>
                <div className="small-note">Confidence threshold: {dashboard.autoFixConfidenceThreshold}% | Above threshold: {dashboard.thresholdPassedCount} | Below threshold: {dashboard.thresholdQueuedCount}</div>
              </section>

              <section className="panel">
                <h2>4) Integration PoC | 5) Strategic Value | 6) Market Differentiation</h2>
                <div className="small-note">PIE (Policy Integrity Engine) publishes event-compatible payloads for Guidewire PolicyCenter and BillingCenter with minimal workflow disruption.</div>
                <div className="toggle-grid">
                  {integrationTargets.map((target) => (
                    <label key={target} className="inline-check">
                      <input
